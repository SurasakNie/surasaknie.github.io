<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaoDec WS2815 Single Strip Controller — LED Strip Test Kit — Rev 1.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
  :root {
    --bg-dark:#060a0b;--bg-panel:rgba(10,18,20,0.95);
    --wire-12v:#eaddaa;--wire-5v:#c9a86a;--wire-3v3:#a28854;--wire-gnd:#4a6b6d;--wire-data:#88e2d6;
    --text-primary:#ffffff;--text-secondary:#8eb5b8;--accent:#eaddaa;
    --border:rgba(74,107,109,0.6);--comp-fill:#0f1a1c;--comp-stroke:#4a6b6d;--pin-dot:#88e2d6;--warn:#ff5555;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg-dark);color:var(--text-primary);font-family:'Roboto',sans-serif;min-height:100vh;overflow:hidden}
  .schematic-container{width:100%;height:100vh;overflow:hidden;position:relative;cursor:grab}
  .schematic-container.grabbing{cursor:grabbing}
  .svg-wrapper{transform-origin:0 0;will-change:transform;position:absolute;top:0;left:0}
  .comp{fill:var(--comp-fill);stroke:var(--comp-stroke);stroke-width:1.5;cursor:pointer;transition:all .2s ease}
  .comp:hover{fill:#142326;stroke:var(--accent);stroke-width:2}
  .sec-border-dash{fill:none;stroke:var(--comp-stroke);stroke-width:1.5;stroke-dasharray:6 6;opacity:.8}
  .w12v{stroke:var(--wire-12v);stroke-width:2.5;fill:none}
  .wgnd{stroke:var(--wire-gnd);stroke-width:2.5;fill:none}
  .wgnd-bus{stroke:var(--wire-gnd);stroke-width:4;fill:none}
  .w5v{stroke:var(--wire-5v);stroke-width:2;fill:none}
  .wdata{stroke:var(--wire-data);stroke-width:2;fill:none}
  .wdata-bkp{stroke:var(--wire-data);stroke-width:2;fill:none;stroke-dasharray:7 4}
  .w3v3{stroke:var(--wire-3v3);stroke-width:2;fill:none}
  .j12v{fill:var(--wire-12v)}.jgnd{fill:var(--wire-gnd)}.j5v{fill:var(--wire-5v)}.jdata{fill:var(--wire-data)}.pin{fill:var(--pin-dot)}
  polyline[data-info],line[data-info],path[data-info]{cursor:pointer;pointer-events:visibleStroke}
  polyline[data-info]:hover,line[data-info]:hover,path[data-info]:hover{stroke-width:6;filter:brightness(1.4)}
  text{font-family:'Roboto',sans-serif;font-weight:500}
  .bold-text{font-weight:700}.black-text{font-weight:900}
  .tip{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#060a0b;border:1px solid var(--accent);border-radius:4px;padding:16px 24px;font-size:15px;color:var(--text-primary);opacity:0;pointer-events:none;z-index:100;max-width:620px;text-align:center;transition:opacity .2s,transform .2s}
  .tip.on{opacity:1;transform:translateX(-50%) translateY(-8px)}
  .tip .ttl{color:var(--accent);font-weight:900;margin-bottom:6px;font-size:16px;letter-spacing:1px;text-transform:uppercase}
  .tip .desc{line-height:1.5;color:var(--text-secondary);font-weight:500}
  #zoom-controls{position:fixed;bottom:30px;left:30px;display:flex;gap:6px;z-index:100;align-items:center}
  .zoom-btn{background:var(--bg-panel);border:1px solid var(--border);color:var(--text-primary);width:40px;height:40px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;transition:all .2s;font-family:'Roboto',sans-serif}
  .zoom-btn:hover{border-color:var(--accent);color:var(--accent)}
  .zoom-btn:active{transform:scale(.95)}
  .zoom-btn.fit-btn{width:auto;padding:0 14px;font-size:13px;letter-spacing:1px;font-weight:700}
  #zoom-level{color:var(--text-primary);font-size:13px;font-weight:700;min-width:52px;text-align:center;padding:0 6px;user-select:none}
  .zoom-shortcut-hint{position:fixed;bottom:75px;left:30px;font-size:11px;font-weight:500;color:var(--text-secondary);z-index:100;letter-spacing:.5px}
</style>
</head>
<body>
<div class="schematic-container" id="schematic-container">
<div class="svg-wrapper" id="svg-wrapper">
<svg width="1600" height="1210" viewBox="0 0 1600 1210" xmlns="http://www.w3.org/2000/svg" id="schematic-svg">

  <!-- Corner marks -->
  <g stroke="var(--text-secondary)" stroke-width="2" opacity="0.6">
    <path d="M 10 20 h 20 M 20 10 v 20"/>
    <path d="M 1570 20 h 20 M 1580 10 v 20"/>
    <path d="M 10 1190 h 20 M 20 1180 v 20"/>
    <path d="M 1570 1190 h 20 M 1580 1180 v 20"/>
  </g>

  <!-- ============================================================ HEADER ============================================================ -->
  <text x="60" y="50" font-size="30" fill="var(--text-primary)" class="black-text" letter-spacing="5">N A O D E C</text>
  <text x="60" y="76" font-size="14" fill="var(--accent)" class="bold-text" letter-spacing="1">WS2815 Single Strip Controller · LED Strip Test Kit · Rev 1.0</text>
  <text x="60" y="96" font-size="13" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">ESP32-S3 DevKitC-1 · SN74AHCT125N · 336 LEDs · 12VDC · WLED</text>
  <!-- Legend -->
  <rect x="700" y="30" width="610" height="46" rx="4" fill="var(--bg-panel)" stroke="var(--border)" stroke-width="1.5"/>
  <rect x="720" y="51" width="24" height="3" rx="1.5" fill="var(--wire-12v)"/>
  <text x="752" y="57" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">12V</text>
  <rect x="800" y="51" width="24" height="3" rx="1.5" fill="var(--wire-5v)"/>
  <text x="832" y="57" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">5V</text>
  <rect x="880" y="51" width="24" height="3" rx="1.5" fill="var(--wire-gnd)"/>
  <text x="912" y="57" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GND</text>
  <rect x="965" y="51" width="24" height="3" rx="1.5" fill="var(--wire-3v3)"/>
  <text x="997" y="57" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">3.3V</text>
  <rect x="1055" y="51" width="24" height="3" rx="1.5" fill="var(--wire-data)"/>
  <text x="1087" y="57" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">DATA 5V</text>
  <line x1="1175" y1="52.5" x2="1199" y2="52.5" stroke="var(--wire-data)" stroke-width="3" stroke-dasharray="4 4"/>
  <text x="1207" y="57" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">BACKUP BI</text>

  <!-- ============================================================
       AVOID GPIO WARNING  (above controller box)
       ============================================================ -->
  <rect x="100" y="108" width="210" height="28" rx="2" fill="#1a160a" stroke="var(--wire-5v)" stroke-width="2"/>
  <text x="205" y="123" font-size="11" fill="var(--wire-5v)" text-anchor="middle" class="black-text" letter-spacing="1">⚠ AVOID GPIO 0,3,45,46</text>
  <text x="205" y="134" font-size="9" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">Strapping pins — boot conflict</text>

  <!-- ============================================================
       CONTROLLER + LEVEL SHIFTER  (55-775, 150-510)
       ============================================================ -->
  <rect x="55" y="150" width="670" height="320" class="sec-border-dash" rx="4"/>
  <rect x="60" y="152" width="285" height="16" fill="var(--bg-dark)"/>
  <text x="65" y="164" font-size="14" fill="var(--text-secondary)" letter-spacing="2" class="black-text">LED CONTROLLER + LEVEL SHIFTER</text>

  <!-- ============================================================
       U1 — ESP32-S3  (100-310, 175-415)
       ============================================================ -->
  <rect x="100" y="175" width="210" height="240" class="comp" rx="2"
        data-info="ESP32-S3-DevKitC-1 (MCU)|N16R8 Module|Dual-core Xtensa LX7 @ 240MHz|16MB Flash · 8MB PSRAM|WiFi 802.11 b/g/n + BLE 5.0|Running WLED firmware|5V → Vin pin|GND → GND pin|GPIO16 → SN74AHCT125N 1A (pin 2)"/>
  <text x="205" y="248" font-size="22" fill="var(--accent)" text-anchor="middle" class="black-text" letter-spacing="1">ESP32-S3</text>
  <text x="205" y="272" font-size="15" fill="var(--text-primary)" text-anchor="middle" class="bold-text" letter-spacing="1">DevKitC-1</text>
  <text x="205" y="295" font-size="12" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">N16R8 · 16MB · 8MB PSRAM</text>
  <text x="205" y="315" font-size="13" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">WLED Firmware</text>
  <!-- Pins -->
  <circle cx="310" cy="330" r="3" class="pin"/>
  <text x="298" y="326" font-size="12" fill="var(--wire-data)" text-anchor="end" class="bold-text">GPIO16</text>
  <circle cx="100" cy="380" r="3" class="pin"/>
  <text x="112" y="384" font-size="12" fill="var(--wire-5v)" class="bold-text">Vin 5V</text>
  <circle cx="100" cy="400" r="3" class="pin"/>
  <text x="112" y="404" font-size="12" fill="var(--wire-gnd)" class="bold-text">GND</text>
  <!-- UART & USB-C -->
  <rect x="130" y="418" width="65" height="28" fill="#1a1a1a" stroke="var(--comp-stroke)" stroke-width="1" rx="2"/>
  <text x="162" y="436" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">UART</text>
  <rect x="215" y="418" width="75" height="28" fill="#1a1a1a" stroke="var(--comp-stroke)" stroke-width="1" rx="2"/>
  <text x="252" y="436" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">USB-C</text>

  <!-- ============================================================
       U1 — SN74AHCT125N  (420-620, 175-440)
       1Y at y=375 aligned with R1 and Strip DI
       ============================================================ -->
  <rect x="420" y="175" width="200" height="265" class="comp" rx="2"
        data-info="U1 — SN74AHCT125N|14-Pin DIP (use IC socket)|Quad Bus Buffer / Line Driver|Only CH1 used (gates 2–4 spare)|VCC (pin 14) = +5V from PSU|GND (pin 7) = common ground bus|1OE (pin 1) → GND (enabled)|1A (pin 2) ← GPIO16 3.3V|1Y (pin 3) → R1 47Ω → 5V data|Spare gates: OE→Vcc, A→GND, Y=N/C"/>
  <text x="520" y="245" font-size="16" fill="var(--accent)" text-anchor="middle" class="black-text">SN74AHCT125N</text>
  <text x="520" y="267" font-size="13" fill="var(--text-primary)" text-anchor="middle" class="bold-text" letter-spacing="1">U1 · Level Shifter</text>
  <text x="520" y="285" font-size="12" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">3.3V → 5V Logic</text>
  <text x="520" y="303" font-size="10" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">14-pin DIP (IC socket)</text>
  <!-- Left Pins -->
  <circle cx="420" cy="320" r="3" class="pin"/>
  <text x="432" y="324" font-size="11" fill="var(--wire-gnd)" class="bold-text">1OE (1)</text>
  <circle cx="420" cy="345" r="3" class="pin"/>
  <text x="432" y="349" font-size="11" fill="var(--wire-data)" class="bold-text">1A (2)</text>
  <circle cx="420" cy="375" r="3" class="pin"/>
  <text x="432" y="379" font-size="11" fill="var(--wire-data)" class="bold-text">1Y (3)</text>
  <circle cx="420" cy="410" r="3" class="pin"/>
  <text x="432" y="414" font-size="11" fill="var(--wire-gnd)" class="bold-text">GND (7)</text>
  <!-- Right Pin -->
  <circle cx="620" cy="220" r="3" class="pin"/>
  <text x="608" y="216" font-size="11" fill="var(--wire-5v)" text-anchor="end" class="bold-text">VCC (14)</text>
  <text x="520" y="432" font-size="10" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">Gates 2–4: OE→VCC, A→GND, Y=N/C</text>

  <!-- ============================================================
       C2 — 100nF  (near VCC)
       ============================================================ -->
  <polyline points="620,220 648,220" class="w5v"/>
  <rect x="648" y="210" width="55" height="24" class="comp" rx="2"
        data-info="C2 — 100nF Ceramic|Decoupling Capacitor|U1 VCC (pin 14) to GND (pin 7)|Prevents CMOS latch-up"/>
  <text x="675" y="222" font-size="9" fill="var(--text-primary)" text-anchor="middle" class="black-text">C2</text>
  <text x="675" y="231" font-size="7" fill="var(--text-secondary)" text-anchor="middle">100nF</text>

  <!-- Spare OE→Vcc: route up to join VCC at x=630 (closer to U1) -->
  <circle cx="620" cy="350" r="3" class="pin"/>
  <polyline points="620,350 630,350 630,220" class="w5v"/>
  <circle cx="630" cy="220" r="2.5" class="j5v"/>
  <text x="634" y="343" font-size="9" fill="var(--wire-5v)" class="bold-text">OE→Vcc</text>
  <!-- Spare A→GND: route to GND node at x=750 -->
  <circle cx="620" cy="390" r="3" class="pin"/>
  <polyline points="620,390 713,390" class="wgnd"/>
  <circle cx="713" cy="390" r="2.5" class="jgnd"/>
  <text x="634" y="386" font-size="9" fill="var(--wire-gnd)" class="bold-text">A→GND</text>

  <!-- ============================================================
       DATA INPUT: GPIO16 → U1 1A  (3.3V)
       (310,330) → (365,330) → (365,345) → (420,345)
       ============================================================ -->
  <polyline points="310,330 365,330 365,345 420,345" class="w3v3" data-info="CH1 Signal · 3.3V|GPIO16 → U1 1A (pin 2)"/>
  <text x="316" y="357" font-size="11" fill="var(--wire-3v3)" class="black-text">CH1 · 3.3V</text>

  <!-- ============================================================
       DATA OUTPUT: U1 1Y → R1  (5V buffered)
       Up from 1Y, arc over data input at y=345,
       right across top at y=145, down to R1 at y=375
       ============================================================ -->
  <path d="M 420,375 L 395,375 L 395,350 A 5,5 0 0,1 395,340 L 395,145 L 720,145 L 720,375 L 730,375" class="wdata"
        data-info="CH1 Buffered · 5V|U1 1Y (pin 3) → R1 47Ω|Arc jump over data input wire"/>
  <text x="558" y="138" font-size="11" fill="var(--wire-data)" text-anchor="middle" class="black-text">CH1 · 5V BUFFERED OUTPUT</text>

  <!-- ============================================================
       R1 — 47Ω  (730-840, 360-390)  ALIGNED with DI at y=375
       ============================================================ -->
  <rect x="730" y="360" width="110" height="30" class="comp" rx="2"
        data-info="R1 — 47Ω Resistor|¼W Metal Film|47Ω for signal reflection protection|Preserves data edges over cable"/>
  <text x="785" y="380" font-size="13" fill="var(--text-primary)" text-anchor="middle" class="black-text">R1 47Ω</text>

  <!-- ============================================================
       R1 → Strip DI + BI  (straight horizontal at y=375)
       ============================================================ -->
  <polyline points="840,375 995,375" class="wdata" data-info="CH1 Data → Strip|R1 47Ω → Strip DI (336 LEDs)|Straight line · 5V · 18 AWG"/>
  <circle cx="960" cy="375" r="3" class="jdata"/>
  <polyline points="960,375 960,390 995,390" class="wdata-bkp" data-info="CH1 Backup Input|Strip BI (backup data)"/>

  <!-- ============================================================
       WS2815 STRIP  (section 960-1310, 320-450 / comp 980-1290, 350-430)
       ============================================================ -->
  <rect x="960" y="320" width="355" height="130" class="sec-border-dash" rx="4"/>
  <rect x="965" y="322" width="280" height="16" fill="var(--bg-dark)"/>
  <text x="970" y="334" font-size="13" fill="var(--text-secondary)" letter-spacing="2" class="black-text">STRIP 1 — WS2815 · 336 LEDs · 12VDC</text>
  <rect x="980" y="350" width="310" height="80" class="comp" rx="2"
        data-info="WS2815 LED Strip|336 × WS2815 12V NeoPixels|Max draw: 6.05A @ full white|Data: GPIO16 via SN74AHCT125N|WLED Output 1 · 12VDC"/>
  <text x="1135" y="378" font-size="17" fill="var(--accent)" text-anchor="middle" class="black-text" letter-spacing="1">WS2815 × 336</text>
  <text x="1135" y="396" font-size="12" fill="var(--text-primary)" text-anchor="middle" class="bold-text">12VDC · 6A max · WLED Out 1</text>
  <text x="1135" y="442" font-size="10" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">GPIO16 → U1 → R1 47Ω → DI · 16AWG / 18AWG</text>
  <!-- Left pins — equal 15px spacing -->
  <circle cx="995" cy="360" r="3" class="pin"/>
  <text x="1007" y="364" font-size="11" fill="var(--wire-12v)" class="black-text">+12V</text>
  <circle cx="995" cy="375" r="3" class="pin"/>
  <text x="1007" y="379" font-size="11" fill="var(--wire-data)" class="black-text">DI</text>
  <circle cx="995" cy="390" r="3" class="pin"/>
  <text x="1007" y="394" font-size="11" fill="var(--wire-data)" class="bold-text">BI</text>
  <circle cx="995" cy="405" r="3" class="pin"/>
  <text x="1007" y="409" font-size="11" fill="var(--wire-gnd)" class="black-text">GND</text>
  <!-- Right pins — equal 15px spacing -->
  <circle cx="1285" cy="360" r="3" class="pin"/>
  <text x="1297" y="364" font-size="11" fill="var(--wire-12v)" class="black-text">+12V</text>
  <circle cx="1285" cy="375" r="3" class="pin"/>
  <text x="1297" y="379" font-size="11" fill="var(--wire-data)" class="black-text">DO</text>
  <circle cx="1285" cy="390" r="3" class="pin"/>
  <text x="1297" y="394" font-size="11" fill="var(--wire-data)" class="bold-text">BO</text>
  <circle cx="1285" cy="405" r="3" class="pin"/>
  <text x="1297" y="409" font-size="11" fill="var(--wire-gnd)" class="black-text">GND</text>

  <!-- ============================================================
       PSU 5V 2A  —  BELOW ESP32  (70-270, 505-625)
       ============================================================ -->
  <rect x="70" y="505" width="200" height="120" class="sec-border-dash" rx="4"/>
  <rect x="75" y="507" width="165" height="16" fill="var(--bg-dark)"/>
  <text x="80" y="519" font-size="12" fill="var(--text-secondary)" class="black-text" letter-spacing="1">POWER SOURCE — LOGIC</text>
  <rect x="82" y="528" width="176" height="72" class="comp" rx="2"
        data-info="PSU 5V 2A|10W AC-DC Supply|Powers ESP32-S3 Vin and SN74AHCT125N VCC|Output: 5V @ 2A|Isolated from 12V rail"/>
  <text x="170" y="560" font-size="18" fill="var(--wire-5v)" text-anchor="middle" class="black-text" letter-spacing="1">PSU 5V 2A</text>
  <text x="170" y="582" font-size="12" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">10W · Logic Power</text>
  <!-- +5V pin on LEFT edge of inner comp box (same style as GND pin) -->
  <circle cx="82" cy="538" r="3" class="pin"/>
  <text x="92" y="534" font-size="11" fill="var(--wire-5v)" class="bold-text">+5V</text>
  <circle cx="82" cy="590" r="3" class="pin"/>
  <text x="92" y="586" font-size="11" fill="var(--wire-gnd)" class="bold-text">GND</text>

  <!-- ============================================================
       5V RAIL  at y=490 — PSU +5V exits LEFT side, arc over GND x=45 twice
       ============================================================ -->
  <!-- PSU feed: left pin → arc over GND at x=45 → up → arc over GND at x=45 → junction at x=80 -->
  <path d="M 82,538 L 50,538 A 5,5 0 0,0 40,538 L 25,538 L 25,490 L 40,490 A 5,5 0 0,1 50,490 L 80,490" class="w5v"
        data-info="+5V from PSU|PSU 5V left pin → 5V rail junction"/>
  <circle cx="80" cy="490" r="3.5" class="j5v"/>
  <!-- Left branch: → ESP32 Vin, exits LEFT from pin, down outside box to rail junction -->
  <polyline points="100,380 25,380 25,490" class="w5v"
        data-info="+5V → ESP32|5V from rail → ESP32-S3 Vin|Exits left from Vin pin, routes down outside controller box"/>
  <circle cx="25" cy="490" r="3.5" class="j5v"/>
  <!-- Right branch: → U1 VCC, arc over U1 GND at x=340, arc over A→GND at y=390 -->
  <path d="M 80,490 L 335,490 A 5,5 0 0,0 345,490 L 630,490 L 630,395 A 5,5 0 0,1 630,385 L 630,220 L 620,220" class="w5v"
        data-info="+5V → U1 VCC|5V rail → SN74AHCT125N VCC (pin 14)|Arc jumps over U1 GND wire and A→GND wire"/>
  <text x="450" y="484" font-size="11" fill="var(--wire-5v)" text-anchor="middle" class="bold-text">+5V RAIL</text>

  <!-- ============================================================
       PSU 12V 8A+  —  BELOW R1  (710-858, 538-592)  outputs on RIGHT
       ============================================================ -->
  <rect x="725" y="538" width="148" height="54" class="comp" rx="2"
        data-info="PSU 12V 8A+|96W+ AC-DC Supply|Powers WS2815 LED strip|Max draw: 6.05A @ full white|ISOLATED — V+ must not bridge"/>
  <text x="799" y="556" font-size="13" fill="var(--wire-12v)" text-anchor="middle" class="black-text" letter-spacing="1">PSU 12V 8A+</text>
  <text x="799" y="570" font-size="10" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">96W+ · LED Power Rail</text>
  <text x="799" y="583" font-size="10" fill="var(--accent)" text-anchor="middle" class="black-text">⚡ ISOLATED</text>
  <!-- +12V and GND pins on RIGHT side -->
  <circle cx="873" cy="553" r="3" class="pin"/>
  <text x="885" y="549" font-size="11" fill="var(--wire-12v)" class="bold-text">+12V</text>
  <circle cx="873" cy="572" r="3" class="pin"/>
  <text x="885" y="568" font-size="11" fill="var(--wire-gnd)" class="bold-text">GND</text>

  <!-- ============================================================
       C1 — 1000µF Filter  (between PSU 12V and strip, on 12V line at x=965)
       ============================================================ -->
  <rect x="945" y="495" width="65" height="30" class="sec-border-dash" rx="4"/>
  <rect x="947" y="493" width="40" height="12" fill="var(--bg-dark)"/>

  <text x="1060" y="930" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">10.</tspan> GPIO 0,3,45,46 / 35–37 / 19–20 avoided.</text>
  <text x="1060" y="950" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">11.</tspan> WLED: 1 output segment in LED Prefs.</text>
  <text x="1060" y="970" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">12.</tspan> Power injection if strip run &gt;5m.</text>
  <text x="1060" y="990" font-size="12" fill="var(--warn)" class="bold-text"><tspan fill="var(--text-primary)">13.</tspan> ~6.05A max (336 × ~18mA @ 12V).</text>
  <text x="1060" y="1010" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">14.</tspan> Use 14-pin DIP socket for U1.</text>

  <text x="1060" y="1055" font-size="14" fill="var(--accent)" class="black-text" letter-spacing="1">REVISION HISTORY</text>
  <text x="1060" y="1085" font-size="13" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">Rev 1.0</tspan> — Initial release.</text>
  <text x="1060" y="1107" font-size="13" fill="var(--text-secondary)" class="bold-text">Single strip, LED Strip Test Kit.</text>
  <text x="1060" y="1129" font-size="13" fill="var(--text-secondary)" class="bold-text">336 × WS2815 · ESP32-S3 · SN74AHCT125N.</text>

</svg>
</div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in" title="Zoom In">+</button>
  <button class="zoom-btn" id="zoom-out" title="Zoom Out">−</button>
  <span id="zoom-level">100%</span>
  <button class="zoom-btn fit-btn" id="zoom-fit" title="Fit to Screen">FIT</button>
  <button class="zoom-btn fit-btn" id="export-svg" title="Export SVG" style="margin-left:12px;color:var(--wire-data);">Export SVG</button>
  <button class="zoom-btn fit-btn" id="export-png" title="Export PNG" style="color:var(--wire-5v);">Export PNG</button>
</div>
<div class="zoom-shortcut-hint">Ctrl+Shift+ +/−/0 · Scroll to zoom · Drag to pan</div>

<div class="tip" id="tip">
  <div class="ttl" id="tipTtl"></div>
  <div class="desc" id="tipDesc"></div>
</div>

<script>
  const tip=document.getElementById('tip'),tipTtl=document.getElementById('tipTtl'),tipDesc=document.getElementById('tipDesc');
  document.querySelectorAll('[data-info]').forEach(el=>{
    el.addEventListener('mouseenter',e=>{const t=e.target.closest('[data-info]')||e.target;const i=t.getAttribute('data-info');if(i){const p=i.split('|');tipTtl.textContent=p[0];tipDesc.innerHTML=p.slice(1).join('<br>');tip.classList.add('on')}});
    el.addEventListener('mouseleave',()=>tip.classList.remove('on'))});
  const container=document.getElementById('schematic-container'),wrapper=document.getElementById('svg-wrapper'),zoomLevelEl=document.getElementById('zoom-level');
  let scale=1,panX=0,panY=0,isPanning=false,startX,startY;
  const MIN_SCALE=0.1,MAX_SCALE=4,ZOOM_STEP=0.15,SVG_W=1600,SVG_H=1210;
  function updateTransform(){wrapper.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;zoomLevelEl.textContent=Math.round(scale*100)+'%'}
  function zoomTo(ns,cx,cy){ns=Math.max(MIN_SCALE,Math.min(MAX_SCALE,ns));if(cx!==undefined&&cy!==undefined){const r=ns/scale;panX=cx-(cx-panX)*r;panY=cy-(cy-panY)*r}scale=ns;updateTransform()}
  function zoomIn(){const r=container.getBoundingClientRect();zoomTo(scale*(1+ZOOM_STEP),r.width/2,r.height/2)}
  function zoomOut(){const r=container.getBoundingClientRect();zoomTo(scale*(1-ZOOM_STEP),r.width/2,r.height/2)}
  function fitToScreen(){const r=container.getBoundingClientRect();scale=Math.min(r.width/SVG_W,r.height/SVG_H)*.95;panX=(r.width-SVG_W*scale)/2;panY=(r.height-SVG_H*scale)/2;updateTransform()}
  document.getElementById('zoom-in').addEventListener('click',zoomIn);
  document.getElementById('zoom-out').addEventListener('click',zoomOut);
  document.getElementById('zoom-fit').addEventListener('click',fitToScreen);
  container.addEventListener('wheel',e=>{e.preventDefault();const r=container.getBoundingClientRect();zoomTo(scale*(e.deltaY>0?(1-ZOOM_STEP):(1+ZOOM_STEP)),e.clientX-r.left,e.clientY-r.top)},{passive:false});
  container.addEventListener('mousedown',e=>{if(e.target.closest('.comp')||e.target.closest('#zoom-controls'))return;isPanning=true;startX=e.clientX-panX;startY=e.clientY-panY;container.classList.add('grabbing')});
  window.addEventListener('mousemove',e=>{if(!isPanning)return;panX=e.clientX-startX;panY=e.clientY-startY;updateTransform()});
  window.addEventListener('mouseup',()=>{isPanning=false;container.classList.remove('grabbing')});
  let lastTouchDist=0;
  container.addEventListener('touchstart',e=>{if(e.touches.length===1){isPanning=true;startX=e.touches[0].clientX-panX;startY=e.touches[0].clientY-panY}else if(e.touches.length===2){isPanning=false;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTouchDist=Math.sqrt(dx*dx+dy*dy)}},{passive:false});
  container.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&isPanning){panX=e.touches[0].clientX-startX;panY=e.touches[0].clientY-startY;updateTransform()}else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const dist=Math.sqrt(dx*dx+dy*dy),r=container.getBoundingClientRect();const cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;zoomTo(scale*(dist/lastTouchDist),cx,cy);lastTouchDist=dist}},{passive:false});
  container.addEventListener('touchend',()=>{isPanning=false});
  window.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey){if(e.key==='+'||e.key==='='){e.preventDefault();zoomIn()}else if(e.key==='-'||e.key==='_'){e.preventDefault();zoomOut()}else if(e.key==='0'||e.key===')'){e.preventDefault();fitToScreen()}}});
  window.addEventListener('load',()=>{setTimeout(fitToScreen,100)});
  function getSvgString(){
    const clone=document.getElementById('schematic-svg').cloneNode(true);
    const styleTag=document.querySelector('style');
    const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
    const style=document.createElementNS("http://www.w3.org/2000/svg","style");
    style.textContent=styleTag?styleTag.innerHTML:'';defs.appendChild(style);
    const bgRect=document.createElementNS("http://www.w3.org/2000/svg","rect");
    bgRect.setAttribute("width","100%");bgRect.setAttribute("height","100%");bgRect.setAttribute("fill","#060a0b");
    clone.insertBefore(bgRect,clone.firstChild);clone.insertBefore(defs,clone.firstChild);
    if(!clone.getAttribute("xmlns"))clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
    return new XMLSerializer().serializeToString(clone)}
  document.getElementById('export-svg').addEventListener('click',()=>{
    const blob=new Blob([getSvgString()],{type:"image/svg+xml;charset=utf-8"});
    const url=URL.createObjectURL(blob);const link=document.createElement("a");link.href=url;
    link.download="NaoDec_WS2815_OptionB_Rev1.0.svg";document.body.appendChild(link);link.click();document.body.removeChild(link);URL.revokeObjectURL(url)});
  document.getElementById('export-png').addEventListener('click',()=>{
    const btn=document.getElementById('export-png');const origText=btn.textContent;btn.textContent="WAIT...";btn.style.opacity="0.5";
    const canvas=document.createElement("canvas");canvas.width=SVG_W;canvas.height=SVG_H;
    const ctx=canvas.getContext("2d");const img=new Image();
    const url=URL.createObjectURL(new Blob([getSvgString()],{type:"image/svg+xml;charset=utf-8"}));
    img.onload=function(){ctx.drawImage(img,0,0);URL.revokeObjectURL(url);
    try{const link=document.createElement("a");link.href=canvas.toDataURL("image/png",1.0);
    link.download="NaoDec_WS2815_OptionB_Rev1.0.png";document.body.appendChild(link);link.click();document.body.removeChild(link)}
    catch(e){console.error("PNG export error:",e.message)}finally{btn.textContent=origText;btn.style.opacity="1"}};img.src=url});
</script>
</body>
</html>
