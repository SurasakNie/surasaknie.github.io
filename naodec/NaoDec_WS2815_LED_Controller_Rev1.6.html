<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaoDec WS2815 LED Controller — 12VDC — Rev 1.6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
  :root {
    --bg-dark:         #060a0b;
    --bg-panel:        rgba(10, 18, 20, 0.95);
    --wire-12v:        #eaddaa;
    --wire-5v:         #c9a86a;
    --wire-3v3:        #a28854;
    --wire-gnd:        #4a6b6d;
    --wire-data:       #88e2d6;
    --wire-data2:      #ffffff;
    --wire-data3:      #7cb3ff;
    --wire-data4:      #c8a2e8;
    --wire-data5:      #f0997b;
    --wire-data6:      #97c459;
    --wire-data7:      #f0d060;
    --text-primary:    #ffffff;
    --text-secondary:  #8eb5b8;
    --accent:          #eaddaa;
    --border:          rgba(74, 107, 109, 0.6);
    --comp-fill:       #0f1a1c;
    --comp-stroke:     #4a6b6d;
    --pin-dot:         #88e2d6;
    --warn:            #ff5555;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }
  .schematic-container {
    width: 100%;
    height: 100vh;
    overflow: hidden;
    position: relative;
    cursor: grab;
  }
  .schematic-container.grabbing { cursor: grabbing; }
  .svg-wrapper {
    transform-origin: 0 0;
    will-change: transform;
    position: absolute;
    top: 0;
    left: 0;
  }
  .comp {
    fill: var(--comp-fill);
    stroke: var(--comp-stroke);
    stroke-width: 1.5;
    cursor: pointer;
    transition: all .2s ease;
  }
  .comp:hover {
    fill: #142326;
    stroke: var(--accent);
    stroke-width: 2;
  }
  .sec-border-dash { fill:none; stroke: var(--comp-stroke); stroke-width:1.5; stroke-dasharray:6 6; opacity: 0.8; }
  .w12v      { stroke:var(--wire-12v);  stroke-width:2.5; fill:none; }
  .w12v-bus  { stroke:var(--wire-12v);  stroke-width:4;   fill:none; }
  .wgnd      { stroke:var(--wire-gnd);  stroke-width:2.5; fill:none; }
  .wgnd-bus  { stroke:var(--wire-gnd);  stroke-width:4;   fill:none; }
  .w5v       { stroke:var(--wire-5v);   stroke-width:2;   fill:none; }
  .wdata     { stroke:var(--wire-data); stroke-width:2;   fill:none; }
  .wdata2    { stroke:var(--wire-data2); stroke-width:2;  fill:none; }
  .wdata3    { stroke:var(--wire-data3); stroke-width:2;  fill:none; }
  .wdata4    { stroke:var(--wire-data4); stroke-width:2;  fill:none; }
  .wdata5    { stroke:var(--wire-data5); stroke-width:2;  fill:none; }
  .wdata6    { stroke:var(--wire-data6); stroke-width:2;  fill:none; }
  .wdata7    { stroke:var(--wire-data7); stroke-width:2;  fill:none; }
  .wbkp-gnd  { stroke:var(--wire-gnd); stroke-width:2; fill:none; }
  .w3v3      { stroke:var(--wire-3v3);  stroke-width:2;   fill:none; }
  .j12v  { fill:var(--wire-12v); }
  .jgnd  { fill:var(--wire-gnd); }
  .j5v   { fill:var(--wire-5v);  }
  .jdata { fill:var(--wire-data); }
  .jdata2{ fill:var(--wire-data2); }
  .jdata3{ fill:var(--wire-data3); }
  .jdata4{ fill:var(--wire-data4); }
  .jdata5{ fill:var(--wire-data5); }
  .jdata6{ fill:var(--wire-data6); }
  .jdata7{ fill:var(--wire-data7); }
  .pin   { fill:var(--pin-dot); }
  polyline[data-info], line[data-info], path[data-info] { cursor: pointer; pointer-events: visibleStroke; }
  polyline[data-info]:hover, line[data-info]:hover, path[data-info]:hover { stroke-width: 6; filter: brightness(1.4); }
  text { font-family: 'Roboto', sans-serif; font-weight: 500; }
  .bold-text { font-weight: 700; }
  .black-text { font-weight: 900; }
  .tip {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background: #060a0b;
    border: 1px solid var(--accent);
    border-radius: 4px; padding: 16px 24px;
    font-size: 15px; color: var(--text-primary);
    opacity:0; pointer-events:none; z-index:100;
    max-width:620px; text-align:center;
    transition: opacity .2s, transform .2s;
  }
  .tip.on { opacity:1; transform:translateX(-50%) translateY(-8px); }
  .tip .ttl { color:var(--accent); font-weight:900; margin-bottom:6px; font-size:16px; letter-spacing: 1px; text-transform: uppercase; }
  .tip .desc { line-height: 1.5; color: var(--text-secondary); font-weight: 500; }
  #zoom-controls {
    position: fixed; bottom: 30px; left: 30px;
    display: flex; gap: 6px; z-index: 100; align-items: center;
  }
  .zoom-btn {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-primary);
    width: 40px; height: 40px; border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; transition: all 0.2s;
    font-family: 'Roboto', sans-serif;
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }
  .zoom-btn:active { transform: scale(0.95); }
  .zoom-btn.fit-btn {
    width: auto; padding: 0 14px; font-size: 13px; letter-spacing: 1px; font-weight: 700;
  }
  #zoom-level {
    color: var(--text-primary); font-size: 13px; font-weight: 700;
    min-width: 52px; text-align: center; padding: 0 6px; user-select: none;
  }
  .zoom-shortcut-hint {
    position: fixed; bottom: 75px; left: 30px;
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
    z-index: 100; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="schematic-container" id="schematic-container">
<div class="svg-wrapper" id="svg-wrapper">
<svg width="2400" height="1800" viewBox="-180 -15 2420 1815" xmlns="http://www.w3.org/2000/svg" id="schematic-svg">

  <!-- CANVAS REGISTRATION MARKS -->
  <g stroke="var(--text-secondary)" stroke-width="2" opacity="0.6">
    <path d="M -150 20 h 20 M -140 10 v 20"/>
    <path d="M 2210 20 h 20 M 2220 10 v 20"/>
    <path d="M -150 1840 h 20 M -140 1830 v 20"/>
    <path d="M 2210 1840 h 20 M 2220 1830 v 20"/>
  </g>

  <g transform="translate(80, 0)">

  <!-- ================================================================
       HEADER / TITLE BLOCK
       ================================================================ -->
  <g id="title-block">
    <text x="40" y="15" font-size="28" fill="var(--text-primary)" class="black-text" letter-spacing="4">N A O D E C</text>
    <text x="40" y="38" font-size="14" fill="var(--accent)" class="bold-text" letter-spacing="1">NaoDec WS2815 LED Controller · Rev 1.6</text>
    <text x="40" y="56" font-size="13" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">2× ESP32-S3 N16R8 (DDP) · 1× SN74AHCT245N</text>
    <!-- Legend Box -->
    <rect x="580" y="25" width="1420" height="46" rx="4" fill="var(--bg-panel)" stroke="var(--border)" stroke-width="1.5"/>
    <rect x="600" y="46" width="24" height="3" rx="1.5" fill="var(--wire-12v)"/>
    <text x="632" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">12V</text>
    <rect x="680" y="46" width="24" height="3" rx="1.5" fill="var(--wire-5v)"/>
    <text x="712" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">5V</text>
    <rect x="750" y="46" width="24" height="3" rx="1.5" fill="var(--wire-gnd)"/>
    <text x="782" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GND</text>
    <rect x="830" y="46" width="24" height="3" rx="1.5" fill="var(--wire-3v3)"/>
    <text x="862" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">3.3V</text>
    <rect x="920" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data)"/>
    <text x="952" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH1</text>
    <rect x="990" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data2)"/>
    <text x="1022" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH2</text>
    <rect x="1060" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data3)"/>
    <text x="1092" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH3</text>
    <rect x="1130" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data4)"/>
    <text x="1162" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH4</text>
    <rect x="1200" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data5)"/>
    <text x="1232" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH5</text>
    <rect x="1270" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data6)"/>
    <text x="1302" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH6</text>
    <rect x="1340" y="46" width="24" height="3" rx="1.5" fill="var(--wire-data7)"/>
    <text x="1372" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">CH7</text>
    <line x1="1430" y1="47.5" x2="1454" y2="47.5" stroke="var(--wire-gnd)" stroke-width="3"/>
    <text x="1462" y="52" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">HEAD BI → GND (first pixel only)</text>
  </g>

  <!-- WARNING -->
  <rect x="1690" y="920" width="310" height="44" rx="2" fill="#1f0a0a" stroke="var(--warn)" stroke-width="2"/>
  <text x="1845" y="938" font-size="12" fill="var(--warn)" text-anchor="middle" class="black-text" letter-spacing="1">⚠ NEVER CONNECT V+ RAILS TOGETHER ⚠</text>
  <text x="1845" y="956" font-size="11" fill="var(--warn)" text-anchor="middle" class="bold-text">5V · 12V(5A) · 12V(50A) — keep positive rails isolated</text>

  <!-- ================================================================
       COMMON GROUND BUS
       ================================================================ -->
  <line x1="-165" y1="1020" x2="2040" y2="1020" class="wgnd-bus"/>
  <text x="2030" y="1010" font-size="15" fill="var(--wire-gnd)" text-anchor="end" class="black-text" letter-spacing="3">── COMMON GROUND BUS ──</text>

  <!-- ================================================================
       MAC MINI (Host System) & PSU 5V 3A
       ================================================================ -->
  <rect x="-170" y="605" width="140" height="70" class="comp" rx="2"
        data-info="Mac mini|Host Controller|Sends WLED/Art-Net data via USB-C to UART"/>
  <text x="-100" y="637" font-size="16" fill="var(--text-primary)" text-anchor="middle" class="black-text" letter-spacing="1">Mac mini</text>
  <text x="-100" y="655" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">Host System</text>

  <!-- USB Type-C Cable to UART -->
  <polyline points="-30,640 125,640 125,582" stroke="var(--text-secondary)" stroke-width="2.5" fill="none" data-info="USB-C to UART|Mac mini → ESP32-S3 Master UART port|WLED / Art-Net data"/>
  <text x="10" y="633" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text" letter-spacing="1">USB-C to UART</text>

  <!-- PSU 5V 3A -->
  <rect x="-170" y="705" width="140" height="65" class="comp" rx="2"
        data-info="PSU 5V 3A|15W AC-DC Supply|Powers ESP32-S3 Master Vin, Slave Vin, U2 VCC|Output: 5V @ 3A|Isolated from 12V rails"/>
  <text x="-100" y="735" font-size="16" fill="var(--wire-5v)" text-anchor="middle" class="black-text" letter-spacing="1">PSU 5V 3A</text>
  <text x="-100" y="755" font-size="12" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">15W · Logic Power</text>
  <text x="5" y="728" font-size="13" fill="var(--wire-5v)" text-anchor="middle" class="bold-text">+5V</text>

  <circle cx="-30" cy="735" r="4.5" class="j5v"/>
  <circle cx="-30" cy="755" r="4.5" class="jgnd"/>

  <!-- ================================================================
       DASHED BOX — Controller PCB Assembly (ESP32s + U2 + R1–R7)
       ================================================================ -->
  <rect x="50" y="135" width="810" height="875" class="sec-border-dash" rx="4"/>
  <text x="65" y="152" font-size="14" fill="var(--text-secondary)" letter-spacing="2" class="black-text">CONTROLLER PCB ASSEMBLY — MASTER + SLAVE + U2 + R1–R7</text>

  <!-- ================================================================
       ESP32-S3-WROOM-1 N16R8 (MASTER)
       ================================================================ -->
  <rect x="65" y="158" width="180" height="35" rx="2" fill="#1a160a" stroke="var(--wire-5v)" stroke-width="2"/>
  <text x="155" y="173" font-size="11" fill="var(--wire-5v)" text-anchor="middle" class="black-text" letter-spacing="1">⚠ AVOID GPIO 0,3,45,46</text>
  <text x="155" y="186" font-size="10" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">Strapping pins — boot conflict</text>

  <rect x="65" y="300" width="180" height="282" class="comp" rx="2"
        data-info="ESP32-S3 (Master)|Main Controller — Calculates all FX|Sends DDP Sync to Slave via Wi-Fi|GPIO1 → CH1 (U2 A1)|GPIO4 → CH2 (U2 A2)|GPIO5 → CH3 (U2 A3)|GPIO6 → CH4 (U2 A4)|Running WLED firmware"/>
  <text x="155" y="445" font-size="20" fill="var(--accent)" text-anchor="middle" class="black-text" letter-spacing="1">ESP32-S3</text>
  <text x="155" y="463" font-size="14" fill="var(--text-primary)" text-anchor="middle" class="bold-text" letter-spacing="1">WROOM-1 N16R8</text>
  <text x="155" y="483" font-size="14" fill="#60a5fa" text-anchor="middle" class="black-text">WLED MASTER</text>

  <!-- Master Pins Left Edge -->
  <circle cx="65" cy="340" r="3" class="pin"/>
  <text x="75" y="345" font-size="13" fill="var(--wire-data2)" text-anchor="start" class="bold-text">GPIO4</text>
  <circle cx="65" cy="358" r="3" class="pin"/>
  <text x="75" y="363" font-size="13" fill="var(--wire-data3)" text-anchor="start" class="bold-text">GPIO5</text>
  <circle cx="65" cy="376" r="3" class="pin"/>
  <text x="75" y="381" font-size="13" fill="var(--wire-data4)" text-anchor="start" class="bold-text">GPIO6</text>

  <circle cx="65" cy="563" r="3" class="pin"/>
  <text x="75" y="568" font-size="13" fill="var(--wire-5v)" text-anchor="start" class="bold-text">5V0</text>
  <circle cx="65" cy="575" r="3" class="pin"/>
  <text x="75" y="580" font-size="13" fill="var(--wire-gnd)" text-anchor="start" class="bold-text">GND</text>

  <!-- Master Pins Right Edge -->
  <circle cx="245" cy="330" r="3" class="pin"/>
  <text x="235" y="335" font-size="13" fill="var(--wire-data)" text-anchor="end" class="bold-text">GPIO1</text>

  <!-- Physical Ports (Bottom) — balanced around center x=155 -->
  <rect x="105" y="582" width="40" height="16" rx="1" fill="#1a1a1a" stroke="var(--comp-stroke)" stroke-width="1"/>
  <text x="125" y="594" font-size="10" fill="var(--text-secondary)" text-anchor="middle">UART</text>
  <rect x="165" y="582" width="40" height="16" rx="1" fill="#1a1a1a" stroke="var(--comp-stroke)" stroke-width="1"/>
  <text x="185" y="594" font-size="10" fill="var(--text-secondary)" text-anchor="middle">USB</text>

  <!-- ================================================================
       DDP CONNECTION LINE — centered between UART and USB
       ================================================================ -->
  <polyline points="155,582 155,650" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
  <text x="165" y="620" font-size="12" fill="#60a5fa" class="bold-text">DDP (Wi-Fi)</text>

  <!-- ================================================================
       ESP32-S3-WROOM-1 N16R8 (SLAVE)
       ================================================================ -->
  <rect x="65" y="650" width="180" height="282" class="comp" rx="2"
        data-info="ESP32-S3 (Slave)|DDP Receiver — No FX Calculation|Receives pixel data from Master via Wi-Fi|GPIO4 → CH5 (U2 A5)|GPIO5 → CH6 (U2 A6)|GPIO6 → CH7 (U2 A7)|Running WLED firmware (DDP mode)"/>
  <text x="155" y="795" font-size="20" fill="var(--accent)" text-anchor="middle" class="black-text" letter-spacing="1">ESP32-S3</text>
  <text x="155" y="813" font-size="14" fill="var(--text-primary)" text-anchor="middle" class="bold-text" letter-spacing="1">WROOM-1 N16R8</text>
  <text x="155" y="833" font-size="14" fill="#a855f7" text-anchor="middle" class="black-text">WLED SLAVE (DDP)</text>

  <!-- Slave Pins Left Edge -->
  <circle cx="65" cy="690" r="3" class="pin"/>
  <text x="75" y="695" font-size="13" fill="var(--wire-data5)" text-anchor="start" class="bold-text">GPIO4</text>
  <circle cx="65" cy="710" r="3" class="pin"/>
  <text x="75" y="715" font-size="13" fill="var(--wire-data6)" text-anchor="start" class="bold-text">GPIO5</text>
  <circle cx="65" cy="730" r="3" class="pin"/>
  <text x="75" y="735" font-size="13" fill="var(--wire-data7)" text-anchor="start" class="bold-text">GPIO6</text>

  <circle cx="65" cy="913" r="3" class="pin"/>
  <text x="75" y="918" font-size="13" fill="var(--wire-5v)" text-anchor="start" class="bold-text">5V0</text>
  <circle cx="65" cy="925" r="3" class="pin"/>
  <text x="75" y="930" font-size="13" fill="var(--wire-gnd)" text-anchor="start" class="bold-text">GND</text>

  <!-- Physical Ports (Bottom) — aligned with Master -->
  <rect x="105" y="932" width="40" height="16" rx="1" fill="#1a1a1a" stroke="var(--comp-stroke)" stroke-width="1"/>
  <text x="125" y="944" font-size="10" fill="var(--text-secondary)" text-anchor="middle">UART</text>
  <rect x="165" y="932" width="40" height="16" rx="1" fill="#1a1a1a" stroke="var(--comp-stroke)" stroke-width="1"/>
  <text x="185" y="944" font-size="10" fill="var(--text-secondary)" text-anchor="middle">USB</text>

  <!-- ================================================================
       U2 — SN74AHCT245N (Octal Bus Transceiver — CH 1–6)
       ================================================================ -->
  <rect x="390" y="270" width="160" height="290" class="comp" rx="2"
        data-info="U2 — SN74AHCT245N|Octal Bus Transceiver / Level Shifter|8-ch bidirectional · 7 used · 1 spare|DIR (pin 1) = VCC → A-to-B direction|OE (pin 19) = GND → always enabled|VCC (pin 20) = 5V|GND (pin 10) = common ground|CH1: M_GPIO1 → A1(2) → B1(18)|CH2: M_GPIO4 → A2(3) → B2(17)|CH3: M_GPIO5 → A3(4) → B3(16)|CH4: M_GPIO6 → A4(5) → B4(15)|CH5: S_GPIO4 → A5(6) → B5(14)|CH6: S_GPIO5 → A6(7) → B6(13)|CH7: S_GPIO6 → A7(8) → B7(12)|A8(9) → GND · B8(11) = N/C"/>
  <text x="470" y="300" font-size="15" fill="var(--accent)" text-anchor="middle" class="black-text">SN74AHCT245N</text>
  <text x="470" y="317" font-size="13" fill="var(--text-primary)" text-anchor="middle" class="bold-text" letter-spacing="1">U2 · CH 1–7</text>
  <text x="470" y="334" font-size="12" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">3.3V → 5V Logic</text>

  <!-- U2 Left Pins (1-10: DIR, A1-A8, GND) -->
  <circle cx="390" cy="355" r="3" class="pin"/>
  <text x="400" y="360" font-size="11" fill="var(--wire-5v)" text-anchor="start" class="bold-text">DIR →5V</text>
  <circle cx="390" cy="375" r="3" class="pin"/>
  <text x="400" y="380" font-size="11" fill="var(--wire-data)" text-anchor="start" class="bold-text">A1 (CH1)</text>
  <circle cx="390" cy="395" r="3" class="pin"/>
  <text x="400" y="400" font-size="11" fill="var(--wire-data2)" text-anchor="start" class="bold-text">A2 (CH2)</text>
  <circle cx="390" cy="415" r="3" class="pin"/>
  <text x="400" y="420" font-size="11" fill="var(--wire-data3)" text-anchor="start" class="bold-text">A3 (CH3)</text>
  <circle cx="390" cy="435" r="3" class="pin"/>
  <text x="400" y="440" font-size="11" fill="var(--wire-data4)" text-anchor="start" class="bold-text">A4 (CH4)</text>
  <circle cx="390" cy="455" r="3" class="pin"/>
  <text x="400" y="460" font-size="11" fill="var(--wire-data5)" text-anchor="start" class="bold-text">A5 (CH5)</text>
  <circle cx="390" cy="475" r="3" class="pin"/>
  <text x="400" y="480" font-size="11" fill="var(--wire-data6)" text-anchor="start" class="bold-text">A6 (CH6)</text>
  <circle cx="390" cy="495" r="3" class="pin"/>
  <text x="400" y="500" font-size="11" fill="var(--wire-data7)" text-anchor="start" class="bold-text">A7 (CH7)</text>
  <circle cx="390" cy="515" r="3" class="pin"/>
  <text x="400" y="520" font-size="11" fill="var(--wire-gnd)" text-anchor="start" class="bold-text">A8 →GND</text>
  <circle cx="390" cy="535" r="3" class="pin"/>
  <text x="400" y="540" font-size="11" fill="var(--wire-gnd)" text-anchor="start" class="bold-text">GND</text>

  <!-- U2 Right Pins (20-11: VCC, OE, B1-B8) -->
  <circle cx="550" cy="355" r="3" class="pin"/>

  <rect x="1350" y="1080" width="650" height="620" class="sec-border-dash" rx="4"/>
  <text x="1372" y="1105" font-size="15" fill="var(--text-secondary)" letter-spacing="2" class="black-text">ENGINEERING NOTES &amp; REVISION HISTORY</text>

  <text x="1370" y="1140" font-size="14" fill="var(--accent)" class="black-text" letter-spacing="1">ENGINEERING NOTES</text>
  <text x="1370" y="1163" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">1.</tspan> Common GND mandatory — all 3 PSU negatives tied.</text>
  <text x="1370" y="1181" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">2.</tspan> VCC (pin 20) on U2 = 5V. DIR (pin 1) = VCC → A-to-B direction.</text>
  <text x="1370" y="1199" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">3.</tspan> U2: OE (pin 19) → GND (all 8 channels enabled).</text>
  <text x="1370" y="1217" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">4.</tspan> U2: A8(9) → GND (unused input). B8(11) = N/C (spare output).</text>
  <text x="1370" y="1235" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">5.</tspan> DDP Network: Master ESP32 handles all FX calc. Slave ESP32 is receiver only.</text>
  <text x="1370" y="1253" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">6.</tspan> WS2815 BI: HEAD pixel only → GND (downstream keep BI ← DO chain).</text>
  <text x="1370" y="1271" font-size="12" fill="var(--warn)" class="bold-text"><tspan fill="var(--text-primary)">7.</tspan> FB1: 6× 7.5A fuses protect 12 AWG from 50A PSU.</text>
  <text x="1370" y="1289" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">8.</tspan> C2–C6,C8 bypass caps (1000µF) at each strip input.</text>
  <text x="1370" y="1307" font-size="12" fill="var(--warn)" class="bold-text"><tspan fill="var(--text-primary)">9.</tspan> ~4.2A/strip (WS2815 = 10–15mA/pixel @ 12V, 280 LEDs).</text>
  <text x="1370" y="1325" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">10.</tspan> GPIO 0,3,45,46 / 35–37 / 19–20 avoided.</text>
  <text x="1370" y="1343" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">11.</tspan> WLED: Master has 4 local outputs + 3 DDP destinations to Slave.</text>
  <text x="1370" y="1361" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">12.</tspan> Power injection if strip run exceeds ~10m — Strip #1 (20m) optional: 2× 12V/5A PSU at head + LED #31.</text>
  <text x="1370" y="1379" font-size="12" fill="var(--warn)" class="bold-text"><tspan fill="var(--text-primary)">13.</tspan> C7 (100nF) close to U2 VCC — prevents latch-up.</text>
  <text x="1370" y="1397" font-size="12" fill="var(--warn)" class="bold-text"><tspan fill="var(--text-primary)">14.</tspan> CH1 Vertex 20m run: single-ended 800kHz past reliable length. Shielded twisted pair; bench-verify waveform.</text>
  <text x="1370" y="1415" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">15.</tspan> R1–R7 on controller PCB ≤20mm from U2 B-outputs (source-end termination).</text>
  <text x="1370" y="1433" font-size="12" fill="var(--warn)" class="bold-text"><tspan fill="var(--text-primary)">16.</tspan> NTC1 (10Ω/10A) series 12V/50A rail — limits inrush from 7× 1000µF bypass caps.</text>
  <text x="1370" y="1451" font-size="12" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">17.</tspan> Strip #1 inject (opt): 2× 12V/5A PSU — head + LED #31; separate V+ rails (no bridge); GND to common bus.</text>

  <!-- Revision History -->
  <text x="1370" y="1466" font-size="14" fill="var(--accent)" class="black-text" letter-spacing="1">REVISION HISTORY</text>
  <text x="1370" y="1494" font-size="13" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">Rev 1.0</tspan> — Initial release.</text>
  <text x="1370" y="1514" font-size="13" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">Rev 1.1</tspan> — Added fuse block (FB1) with 7.5A blade fuses.</text>
  <text x="1370" y="1534" font-size="13" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">Rev 1.2</tspan> — Revised resistors + added C7 decoupling cap.</text>
  <text x="1370" y="1554" font-size="13" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">Rev 1.3</tspan> — Replaced 2× SN74AHCT125N with 1× SN74HCT245N.</text>
  <text x="1370" y="1574" font-size="13" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">Rev 1.4</tspan> — Dual ESP32-S3 with DDP (Master/Slave); single SN74AHCT245N; BI re-routed to GND.</text>
  <text x="1370" y="1594" font-size="13" fill="var(--text-secondary)" class="bold-text"><tspan fill="var(--text-primary)">Rev 1.5</tspan> — 7 strips (280 LEDs each edge); CH7 via U2 A7/B7; Slave GPIO6;<tspan x="1430" dy="16">R7+C8+F7 added; NTC1 inrush limiter; PCB box expanded; C8 taps aligned;</tspan><tspan x="1430" dy="16">Notes #6/#14/#15/#16; R2–R7 corrected 100Ω → 47Ω (prototype parity).</tspan></text>
  <text x="1370" y="1660" font-size="13" fill="var(--accent)" class="bold-text"><tspan fill="var(--text-primary)">Rev 1.6</tspan> — Upgrade the power supply from 5A to 10A.</tspan></text>

  </g>
</svg>
</div>
</div>
<!-- Zoom Controls -->
<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in" title="Zoom In (Ctrl+Shift++)">+</button>
  <button class="zoom-btn" id="zoom-out" title="Zoom Out (Ctrl+Shift+−)">−</button>
  <span id="zoom-level">100%</span>
  <button class="zoom-btn fit-btn" id="zoom-fit" title="Fit to Screen (Ctrl+Shift+0)">FIT</button>
  <button class="zoom-btn fit-btn" id="export-svg" title="Export as Standalone SVG" style="margin-left: 12px; color: var(--wire-data);">Export SVG</button>
  <button class="zoom-btn fit-btn" id="export-png" title="Export as High-Res PNG" style="color: var(--wire-5v);">Export PNG</button>
</div>
<div class="zoom-shortcut-hint">Ctrl+Shift+ +/−/0 · Scroll to zoom · Drag to pan</div>
<!-- Tooltip -->
<div class="tip" id="tip">
  <div class="ttl" id="tipTtl">Component Name</div>
  <div class="desc" id="tipDesc">Description</div>
</div>
<script>
  const tip = document.getElementById('tip');
  const tipTtl = document.getElementById('tipTtl');
  const tipDesc = document.getElementById('tipDesc');
  document.querySelectorAll('[data-info]').forEach(el => {
    el.addEventListener('mouseenter', (e) => {
      const t = e.target.closest('[data-info]') || e.target;
      const info = t.getAttribute('data-info');
      if (info) {
        const parts = info.split('|');
        tipTtl.textContent = parts[0];
        tipDesc.innerHTML = parts.slice(1).join('<br>');
        tip.classList.add('on');
      }
    });
    el.addEventListener('mouseleave', () => tip.classList.remove('on'));
  });
  const container = document.getElementById('schematic-container');
  const wrapper = document.getElementById('svg-wrapper');
  const zoomLevelEl = document.getElementById('zoom-level');
  let scale = 1, panX = 0, panY = 0, isPanning = false, startX, startY;
  const MIN_SCALE = 0.1, MAX_SCALE = 4, ZOOM_STEP = 0.15;
  const SVG_W = 2400, SVG_H = 1900;
  function updateTransform() {
    wrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    zoomLevelEl.textContent = Math.round(scale * 100) + '%';
  }
  function zoomTo(ns, cx, cy) {
    ns = Math.max(MIN_SCALE, Math.min(MAX_SCALE, ns));
    if (cx !== undefined && cy !== undefined) {
      const r = ns / scale;
      panX = cx - (cx - panX) * r;
      panY = cy - (cy - panY) * r;
    }
    scale = ns;
    updateTransform();
  }
  function zoomIn() { const r = container.getBoundingClientRect(); zoomTo(scale * (1 + ZOOM_STEP), r.width / 2, r.height / 2); }
  function zoomOut() { const r = container.getBoundingClientRect(); zoomTo(scale * (1 - ZOOM_STEP), r.width / 2, r.height / 2); }
  function fitToScreen() {
    const r = container.getBoundingClientRect();
    scale = Math.min(r.width / SVG_W, r.height / SVG_H) * 0.95;
    panX = (r.width - SVG_W * scale) / 2;
    panY = (r.height - SVG_H * scale) / 2;
    updateTransform();
  }
  document.getElementById('zoom-in').addEventListener('click', zoomIn);
  document.getElementById('zoom-out').addEventListener('click', zoomOut);
  document.getElementById('zoom-fit').addEventListener('click', fitToScreen);
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const r = container.getBoundingClientRect();
    zoomTo(scale * (e.deltaY > 0 ? (1 - ZOOM_STEP) : (1 + ZOOM_STEP)), e.clientX - r.left, e.clientY - r.top);
  }, { passive: false });
  container.addEventListener('mousedown', (e) => {
    if (e.target.closest('.comp') || e.target.closest('#zoom-controls')) return;
    isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY;
    container.classList.add('grabbing');
  });
  window.addEventListener('mousemove', (e) => { if (!isPanning) return; panX = e.clientX - startX; panY = e.clientY - startY; updateTransform(); });
  window.addEventListener('mouseup', () => { isPanning = false; container.classList.remove('grabbing'); });
  let lastTouchDist = 0;
  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) { isPanning = true; startX = e.touches[0].clientX - panX; startY = e.touches[0].clientY - panY; }
    else if (e.touches.length === 2) { isPanning = false; const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY; lastTouchDist = Math.sqrt(dx*dx+dy*dy); }
  }, { passive: false });
  container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isPanning) { panX = e.touches[0].clientX - startX; panY = e.touches[0].clientY - startY; updateTransform(); }
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx+dy*dy), r = container.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - r.left, cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - r.top;
      zoomTo(scale * (dist / lastTouchDist), cx, cy); lastTouchDist = dist;
    }
  }, { passive: false });
  container.addEventListener('touchend', () => { isPanning = false; });
  window.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey) {
      if (e.key === '+' || e.key === '=') { e.preventDefault(); zoomIn(); }
      else if (e.key === '-' || e.key === '_') { e.preventDefault(); zoomOut(); }
      else if (e.key === '0' || e.key === ')') { e.preventDefault(); fitToScreen(); }
    }
  });
  window.addEventListener('load', () => { setTimeout(fitToScreen, 100); });
  function getSvgString() {
    const clone = document.getElementById('schematic-svg').cloneNode(true);
    const styleTag = document.querySelector('style');
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    const style = document.createElementNS("http://www.w3.org/2000/svg", "style");
    style.textContent = styleTag ? styleTag.innerHTML : '';
    defs.appendChild(style);
    const bgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    bgRect.setAttribute("width", "100%"); bgRect.setAttribute("height", "100%"); bgRect.setAttribute("fill", "#060a0b");
    clone.insertBefore(bgRect, clone.firstChild);
    clone.insertBefore(defs, clone.firstChild);
    if (!clone.getAttribute("xmlns")) clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
    return new XMLSerializer().serializeToString(clone);
  }
  document.getElementById('export-svg').addEventListener('click', () => {
    const blob = new Blob([getSvgString()], {type: "image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a"); link.href = url; link.download = "NaoDec_WS2815_LED_Controller_Rev1.5.svg";
    document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
  });
  document.getElementById('export-png').addEventListener('click', () => {
    const btn = document.getElementById('export-png');
    const origText = btn.textContent; btn.textContent = "WAIT..."; btn.style.opacity = "0.5";
    const canvas = document.createElement("canvas"); canvas.width = SVG_W; canvas.height = SVG_H;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    const url = URL.createObjectURL(new Blob([getSvgString()], {type: "image/svg+xml;charset=utf-8"}));
    img.onload = function() {
      ctx.drawImage(img, 0, 0); URL.revokeObjectURL(url);
      try {
        const link = document.createElement("a"); link.href = canvas.toDataURL("image/png", 1.0);
        link.download = "NaoDec_WS2815_LED_Controller_Rev1.5.png";
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      } catch (e) {
        console.error("PNG export error:", e.message);
      } finally { btn.textContent = origText; btn.style.opacity = "1"; }
    };
    img.src = url;
  });
</script>
</body>
