<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Vertical Hydroponic Tower — Schematic Rev 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
  /* === THEME START — Cyberpunk === */
  :root {
    --bg-dark:          #0A0A0F;
    --bg-panel:         rgba(20, 20, 31, 0.95);
    --wire-12v:         #FF6B2B;
    --wire-5v:          #F5E642;
    --wire-3v3:         #1D8FD4;
    --wire-gnd:         #404058;
    --wire-data:        #0FF0B3;
    --wire-data2:       #FF2D78;
    --wire-data3:       #BF5FFF;
    --wire-data4:       #FFC0A3;
    --wire-data5:       #A3FCED;
    --wire-data6:       #DCA3FF;
    --wire-data7:       #8888A0;
    --text-primary:     #E0E0F0;
    --text-secondary:   #8888A0;
    --accent:           #0FF0B3;
    --border:           rgba(44, 44, 64, 0.8);
    --comp-fill:        #14141F;
    --comp-fill-hover:  #22222E;
    --comp-stroke:      #2C2C40;
    --pin-dot:          #0FF0B3;
    --warn:             #FF2D78;
    --warn-bg:          #2E0214;
  }
  /* === THEME END === */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg-dark); color:var(--text-primary); font-family:'Roboto',sans-serif; min-height:100vh; overflow:hidden; }
  .schematic-container { width:100%; height:100vh; overflow:hidden; position:relative; cursor:grab; }
  .schematic-container.grabbing { cursor:grabbing; }
  .svg-wrapper { transform-origin:0 0; will-change:transform; position:absolute; top:0; left:0; }
  .comp { fill:var(--comp-fill); stroke:var(--comp-stroke); stroke-width:1.5; cursor:pointer; transition:all .2s ease; }
  .comp:hover { fill:var(--comp-fill-hover); stroke:var(--accent); stroke-width:2; }
  .sec-border-dash { fill:none; stroke:var(--comp-stroke); stroke-width:1.5; stroke-dasharray:6 6; opacity:0.8; }
  .w12v     { stroke:var(--wire-12v); stroke-width:2.5; fill:none; }
  .w12v-bus { stroke:var(--wire-12v); stroke-width:4;   fill:none; }
  .wgnd     { stroke:var(--wire-gnd); stroke-width:2.5; fill:none; }
  .wgnd-bus { stroke:var(--wire-gnd); stroke-width:4;   fill:none; }
  .w5v      { stroke:var(--wire-5v);  stroke-width:2;   fill:none; }
  .w3v3     { stroke:var(--wire-3v3); stroke-width:2;   fill:none; }
  .wdata    { stroke:var(--wire-data);  stroke-width:2; fill:none; }
  .wdata2   { stroke:var(--wire-data2); stroke-width:2; fill:none; }
  .wdata3   { stroke:var(--wire-data3); stroke-width:2; fill:none; }
  .wdata4   { stroke:var(--wire-data4); stroke-width:2; fill:none; }
  .wdata5   { stroke:var(--wire-data5); stroke-width:2; fill:none; }
  .j12v  { fill:var(--wire-12v); }
  .j5v   { fill:var(--wire-5v);  }
  .j3v3  { fill:var(--wire-3v3); }
  .jdata { fill:var(--wire-data); }
  .jdata2{ fill:var(--wire-data2); }
  .jdata3{ fill:var(--wire-data3); }
  .jdata4{ fill:var(--wire-data4); }
  .jdata5{ fill:var(--wire-data5); }
  .pin   { fill:var(--pin-dot); }
  polyline[data-info], line[data-info], path[data-info] { cursor:pointer; pointer-events:visibleStroke; }
  polyline[data-info]:hover, line[data-info]:hover, path[data-info]:hover { stroke-width:6; filter:brightness(1.4); }
  text { font-family:'Roboto',sans-serif; font-weight:500; }
  .bold-text  { font-weight:700; }
  .black-text { font-weight:900; }
  .tip { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--bg-dark); border:1px solid var(--accent); border-radius:4px; padding:16px 24px; font-size:15px; color:var(--text-primary); opacity:0; pointer-events:none; z-index:100; max-width:620px; text-align:center; transition:opacity .2s,transform .2s; }
  .tip.on { opacity:1; transform:translateX(-50%) translateY(-8px); }
  .tip .ttl { color:var(--accent); font-weight:900; margin-bottom:6px; font-size:16px; letter-spacing:1px; text-transform:uppercase; }
  .tip .desc { line-height:1.5; color:var(--text-secondary); font-weight:500; }
  #zoom-controls { position:fixed; bottom:30px; left:30px; display:flex; gap:6px; z-index:100; align-items:center; }
  .zoom-btn { background:var(--bg-panel); border:1px solid var(--border); color:var(--text-primary); width:40px; height:40px; border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; transition:all 0.2s; font-family:'Roboto',sans-serif; }
  .zoom-btn:hover { border-color:var(--accent); color:var(--accent); }
  .zoom-btn:active { transform:scale(0.95); }
  .zoom-btn.fit-btn { width:auto; padding:0 14px; font-size:13px; letter-spacing:1px; font-weight:700; }
  #zoom-level { color:var(--text-primary); font-size:13px; font-weight:700; min-width:52px; text-align:center; padding:0 6px; user-select:none; }
  .zoom-shortcut-hint { position:fixed; bottom:75px; left:30px; font-size:11px; font-weight:500; color:var(--text-secondary); z-index:100; letter-spacing:0.5px; }
</style>
</head>
<body>
<div class="schematic-container" id="schematic-container">
<div class="svg-wrapper" id="svg-wrapper">
<svg width="2400" height="1800" viewBox="-180 -15 2420 1815"
     xmlns="http://www.w3.org/2000/svg" id="schematic-svg">

  <!-- REGISTRATION MARKS -->
  <g stroke="var(--text-secondary)" stroke-width="2" opacity="0.6">
    <path d="M -150 20 h 20 M -140 10 v 20"/>
    <path d="M 2210 20 h 20 M 2220 10 v 20"/>
    <path d="M -150 1840 h 20 M -140 1830 v 20"/>
    <path d="M 2210 1840 h 20 M 2220 1830 v 20"/>
  </g>

  <g transform="translate(80,0)">

    <!-- =================================================
         TITLE BLOCK
         ================================================= -->
    <g id="title-block">
      <text x="40" y="18" font-size="22" fill="var(--text-primary)" class="black-text" letter-spacing="4">S M A R T  V E R T I C A L  H Y D R O P O N I C S  T O W E R</text>
      <text x="40" y="40" font-size="14" fill="var(--accent)" class="bold-text" letter-spacing="1">Smart Vertical Tower · Schematic Rev 1 · 2026-05-06</text>
      <text x="40" y="58" font-size="13" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">ESP32 · 12V DC · Water Pump · LED Strips · DHT22 · TSL2591 · XKC-Y25-V</text>
      <!-- Legend -->
      <rect x="1260" y="10" width="960" height="52" rx="4" fill="var(--bg-panel)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="1280" y="33" width="24" height="3" rx="1.5" fill="var(--wire-12v)"/>
      <text x="1312" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">12V</text>
      <rect x="1360" y="33" width="24" height="3" rx="1.5" fill="var(--wire-5v)"/>
      <text x="1392" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">5V</text>
      <rect x="1430" y="33" width="24" height="3" rx="1.5" fill="var(--wire-gnd)"/>
      <text x="1462" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GND</text>
      <rect x="1510" y="33" width="24" height="3" rx="1.5" fill="var(--wire-3v3)"/>
      <text x="1542" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">3.3V</text>
      <rect x="1600" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data)"/>
      <text x="1632" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GPIO4</text>
      <rect x="1700" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data2)"/>
      <text x="1732" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">I2C</text>
      <rect x="1780" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data3)"/>
      <text x="1812" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">SENSOR</text>
      <rect x="1890" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data4)"/>
      <text x="1922" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GPIO25</text>
      <rect x="2000" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data5)"/>
      <text x="2032" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GPIO26</text>
    </g>

    <!-- =================================================
         ZONE A — POWER CHAIN  (y 100–310)
         ================================================= -->

    <!-- 12V Bus -->
    <line x1="50" y1="250" x2="1900" y2="250" class="w12v-bus"
          data-info="12V Power Bus|Main distribution rail|Feeds: XL4015 Buck, MOSFET drains (pump + LED)|Fused at 10A inline"/>
    <text x="1895" y="242" font-size="13" fill="var(--wire-12v)" text-anchor="end" class="black-text" letter-spacing="2">── 12V BUS ──</text>

    <!-- PSU block -->
    <rect class="comp" rx="2" x="50" y="130" width="160" height="100"
          data-info="12V PSU · 10A|Switching supply|⚠ CRIT-2: Upgrade to 15A before scaling|Connects to 10A fuse → 12V bus"/>
    <text x="130" y="173" font-size="16" fill="var(--accent)" text-anchor="middle" class="black-text">12V PSU</text>
    <text x="130" y="193" font-size="13" fill="var(--text-primary)" text-anchor="middle" class="bold-text">10A DC</text>
    <text x="130" y="213" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">Switching Supply</text>

    <!-- PSU (+) → Fuse (inline on horizontal wire at y=180) -->
    <line x1="210" y1="180" x2="250" y2="180" class="w12v"/>

    <!-- PSU GND → Ground Bus -->
    <line x1="130" y1="230" x2="130" y2="1020" class="wgnd"/>

    <!-- 10A Fuse -->
    <rect class="comp" rx="2" x="250" y="158" width="90" height="44"
          data-info="10A Fuse|Inline on positive 12V rail|Protects all downstream loads|Blade/automotive fuse type"/>
    <text x="295" y="177" font-size="13" fill="var(--accent)" text-anchor="middle" class="black-text">10A</text>
    <text x="295" y="194" font-size="11" fill="var(--text-primary)" text-anchor="middle" class="bold-text">FUSE</text>

    <!-- Fuse right → vertical drop to 12V bus -->
    <line x1="340" y1="180" x2="390" y2="180" class="w12v"/>
    <line x1="390" y1="180" x2="390" y2="250" class="w12v"/>
    <circle cx="390" cy="250" r="4.5" class="j12v"/>

    <!-- XL4015 Buck Converter block — sits ABOVE 12V bus -->
    <rect class="comp" rx="2" x="430" y="125" width="150" height="110"
          data-info="XL4015 Buck Converter|12V → 5V step-down|Set output to 5.0–5.2V|Feeds ESP32 VIN + XKC-Y25-V sensor"/>
    <text x="505" y="166" font-size="15" fill="var(--accent)" text-anchor="middle" class="black-text">XL4015</text>
    <text x="505" y="186" font-size="13" fill="var(--text-primary)" text-anchor="middle" class="bold-text">BUCK 5V</text>
    <text x="505" y="204" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">12V → 5V</text>
    <text x="505" y="220" font-size="10" fill="var(--text-secondary)" text-anchor="middle">Adj. pot on module</text>

    <!-- 12V IN: from 12V bus (y=250) UP into left side of XL4015 bottom (y=235) -->
    <!-- Offset left at x=478 so it does NOT overlap with the 5V OUT line -->
    <line x1="478" y1="250" x2="478" y2="235" class="w12v"
          data-info="12V → XL4015 VIN|Tap from 12V bus|Powers the buck converter"/>
    <circle cx="478" cy="250" r="4.5" class="j12v"/>
    <text x="484" y="245" font-size="9" fill="var(--wire-12v)" class="bold-text">12V IN</text>

    <!-- 5V OUT: from right side of XL4015 bottom (y=235) DOWN to 5V rail (y=300) -->
    <!-- Offset right at x=557 so it does NOT overlap with the 12V IN line -->
    <line x1="557" y1="235" x2="557" y2="300" class="w5v"
          data-info="XL4015 → 5V RAIL|Regulated 5V output|To ESP32 VIN and XKC-Y25-V sensor"/>
    <circle cx="557" cy="300" r="3.5" class="j5v"/>
    <text x="563" y="272" font-size="9" fill="var(--wire-5v)" class="bold-text">5V OUT</text>

    <!-- XL4015 GND → Ground Bus -->
    <line x1="505" y1="235" x2="505" y2="1020" class="wgnd"/>

    <!-- 5V rail (horizontal, starts at x=557 rightward) -->
    <line x1="557" y1="300" x2="1900" y2="300" class="w5v"
          data-info="5V Rail|XL4015 regulated output|Feeds: ESP32 VIN, XKC-Y25-V sensor|Target: 5.0–5.2V"/>
    <text x="1895" y="292" font-size="12" fill="var(--wire-5v)" text-anchor="end" class="black-text" letter-spacing="2">── 5V RAIL ──</text>

    <!-- =================================================
         ZONE B — ESP32 MCU  (y 370–660)
         ================================================= -->

    <!-- ESP32 body -->
    <rect class="comp" rx="2" x="620" y="370" width="200" height="300"
          data-info="ESP32 Microcontroller|VIN=5V · Internal 3.3V LDO|GPIO4: DHT22 · GPIO21/22: I2C|GPIO25: Pump · GPIO26: LED · GPIO34: WL in"/>
    <text x="720" y="415" font-size="20" fill="var(--accent)" text-anchor="middle" class="black-text">ESP32</text>
    <text x="720" y="438" font-size="14" fill="var(--text-primary)" text-anchor="middle" class="bold-text">30-pin Module</text>
    <text x="720" y="458" font-size="12" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">3.3V internal LDO</text>
    <text x="720" y="478" font-size="11" fill="var(--wire-3v3)" text-anchor="middle" class="bold-text">3.3V INT RAIL</text>

    <!-- ESP32 left pins -->
    <circle cx="620" cy="500" r="3" class="pin"/>
    <text x="610" y="504" font-size="12" fill="var(--wire-5v)" text-anchor="end" class="bold-text">VIN</text>
    <circle cx="620" cy="526" r="3" class="pin"/>
    <text x="610" y="530" font-size="12" fill="var(--wire-gnd)" text-anchor="end" class="bold-text">GND</text>
    <circle cx="620" cy="572" r="3" class="pin"/>
    <text x="610" y="576" font-size="11" fill="var(--wire-data3)" text-anchor="end" class="bold-text">GPIO34</text>
    <text x="610" y="589" font-size="9" fill="var(--text-secondary)" text-anchor="end">(input only)</text>

    <!-- ESP32 right pins -->
    <circle cx="820" cy="500" r="3" class="pin"/>
    <text x="830" y="504" font-size="12" fill="var(--wire-data)" text-anchor="start" class="bold-text">GPIO4</text>
    <circle cx="820" cy="525" r="3" class="pin"/>
    <text x="830" y="529" font-size="12" fill="var(--wire-data2)" text-anchor="start" class="bold-text">GPIO21 SDA</text>
    <circle cx="820" cy="550" r="3" class="pin"/>
    <text x="830" y="554" font-size="12" fill="var(--wire-data2)" text-anchor="start" class="bold-text">GPIO22 SCL</text>
    <circle cx="820" cy="590" r="3" class="pin"/>
    <text x="830" y="594" font-size="12" fill="var(--wire-data4)" text-anchor="start" class="bold-text">GPIO25</text>
    <circle cx="820" cy="620" r="3" class="pin"/>
    <text x="830" y="624" font-size="12" fill="var(--wire-data5)" text-anchor="start" class="bold-text">GPIO26</text>

    <!-- 5V rail → ESP32 VIN: routed at x=612 (outside the ESP32 left edge at x=620) -->
    <line x1="612" y1="300" x2="612" y2="497" class="w5v"
          data-info="5V → ESP32 VIN|Buck converter regulated 5V|ESP32 internal LDO generates 3.3V"/>
    <circle cx="612" cy="300" r="3.5" class="j5v"/>
    <line x1="612" y1="500" x2="620" y2="500" class="w5v"/>

    <!-- ESP32 GND → Ground Bus (exits GND pin left, routes clear of 5V line at x=612) -->
    <polyline points="620,526 595,526 595,1020" class="wgnd"/>

    <!-- =================================================
         ZONE C — SENSORS  (y 430–800)
         Left column, routed CLEAR of 5V and 3.3V buses
         ================================================= -->

    <!-- DHT22 block -->
    <rect class="comp" rx="2" x="200" y="440" width="150" height="75"
          data-info="DHT22 · Temp/Humidity|VCC=3.3V · GPIO4 data|Single-wire protocol|No external pullup needed (module)"/>
    <text x="275" y="468" font-size="14" fill="var(--accent)" text-anchor="middle" class="black-text">DHT22</text>
    <text x="275" y="486" font-size="12" fill="var(--text-primary)" text-anchor="middle" class="bold-text">Temp / Humidity</text>
    <text x="275" y="503" font-size="10" fill="var(--text-secondary)" text-anchor="middle">VCC=3.3V · GPIO4</text>

    <!-- DHT22 VCC — 3.3V power stub (goes UP from block top, no long bus wire needed) -->
    <line x1="240" y1="440" x2="240" y2="424" stroke="var(--wire-3v3)" stroke-width="2"/>
    <text x="240" y="416" font-size="11" fill="var(--wire-3v3)" text-anchor="middle" class="bold-text">3.3V</text>

    <!-- DHT22 GND → Ground Bus (routes left, clear of sensor boxes) -->
    <polyline points="275,515 192,515 192,1020" class="wgnd"/>

    <!-- GPIO4 → DHT22 DATA: exits ESP32 right (820,500), routes clear of sensor boxes -->
    <polyline points="820,500 880,500 880,470 350,470" class="wdata"
              data-info="GPIO4 · DHT22 Data|Single-wire DHT protocol|ESP32 GPIO4 → DHT22 DATA pin"/>
    <text x="615" y="463" font-size="10" fill="var(--wire-data)" text-anchor="middle" class="bold-text">GPIO4</text>

    <!-- TSL2591 block -->
    <rect class="comp" rx="2" x="200" y="565" width="150" height="75"
          data-info="TSL2591 · I2C Light Sensor|VCC=3.3V · SDA→GPIO21 · SCL→GPIO22|Lux + full/IR spectrum|I2C address: 0x29"/>
    <text x="275" y="593" font-size="14" fill="var(--accent)" text-anchor="middle" class="black-text">TSL2591</text>
    <text x="275" y="611" font-size="12" fill="var(--text-primary)" text-anchor="middle" class="bold-text">Light Sensor</text>
    <text x="275" y="628" font-size="10" fill="var(--text-secondary)" text-anchor="middle">I2C · 0x29</text>

    <!-- TSL2591 VCC — 3.3V power stub -->
    <line x1="240" y1="565" x2="240" y2="549" stroke="var(--wire-3v3)" stroke-width="2"/>
    <text x="240" y="541" font-size="11" fill="var(--wire-3v3)" text-anchor="middle" class="bold-text">3.3V</text>

    <!-- TSL2591 GND → Ground Bus (routes right, clear of XKC box) -->
    <polyline points="275,640 358,640 358,1020" class="wgnd"/>

    <!-- I2C SDA GPIO21 → TSL2591: routed around sensor block right edges -->
    <polyline points="820,525 892,525 892,602 350,602" class="wdata2"
              data-info="I2C SDA · GPIO21|ESP32 → TSL2591 SDA|I2C shared bus"/>
    <!-- I2C SCL GPIO22 → TSL2591 -->
    <polyline points="820,550 904,550 904,620 350,620" class="wdata2"
              data-info="I2C SCL · GPIO22|I2C clock · ESP32 master"/>
    <text x="570" y="596" font-size="10" fill="var(--wire-data2)" text-anchor="middle" class="bold-text">SDA/SCL</text>

    <!-- XKC-Y25-V water level sensor -->
    <rect class="comp" rx="2" x="200" y="700" width="150" height="75"
          data-info="XKC-Y25-V · Non-contact Water Level|VCC=5V (min rated)|Output through 10kΩ/20kΩ divider → GPIO34"/>
    <text x="275" y="726" font-size="12" fill="var(--accent)" text-anchor="middle" class="black-text">XKC-Y25-V</text>
    <text x="275" y="744" font-size="12" fill="var(--text-primary)" text-anchor="middle" class="bold-text">Water Level</text>
    <text x="275" y="762" font-size="10" fill="var(--text-secondary)" text-anchor="middle">Non-contact · 5V</text>

    <!-- XKC VCC — 5V power stub (no long vertical wire through sensor column) -->
    <line x1="240" y1="700" x2="240" y2="684" stroke="var(--wire-5v)" stroke-width="2"/>
    <text x="240" y="676" font-size="11" fill="var(--wire-5v)" text-anchor="middle" class="bold-text">5V</text>

    <!-- XKC GND → Ground Bus -->
    <polyline points="275,775 230,775 230,1020" class="wgnd"/>

    <!-- XKC signal → Divider (horizontal, right side of XKC) -->
    <line x1="350" y1="737" x2="420" y2="737" class="wdata3"
          data-info="XKC signal output|Digital/NPN output|Into voltage divider for 3.3V-safe GPIO34"/>

    <!-- Voltage Divider block -->
    <rect class="comp" rx="2" x="420" y="715" width="130" height="55"
          data-info="Voltage Divider · 10kΩ/20kΩ|XKC 5V output → 3.33V at GPIO34|Divides 5V signal for GPIO34 input"/>
    <text x="485" y="739" font-size="12" fill="var(--accent)" text-anchor="middle" class="black-text">DIVIDER</text>
    <text x="485" y="757" font-size="11" fill="var(--text-primary)" text-anchor="middle" class="bold-text">R5 10kΩ · R6 20kΩ</text>

    <!-- Divider GND → Ground Bus -->
    <line x1="485" y1="770" x2="485" y2="1020" class="wgnd"/>

    <!-- Divider output → GPIO34: routed at x=608 (OUTSIDE ESP32 left edge at x=620) -->
    <polyline points="550,737 608,737 608,575 620,575" class="wdata3"
              data-info="Divider output → GPIO34|5V signal → 3.33V at nominal 5V rail|Input-only GPIO · Water level detect"/>

    <!-- =================================================
         ZONE D — ACTUATORS  (y 460–720)
         ================================================= -->

    <!-- PUMP GATE PATH: GPIO25 → R1 → MOSFET#1 gate -->
    <!-- Route: right from pin, jog UP at x=955 to R1 centre y, then right to R1 left edge -->
    <polyline points="820,590 955,590 955,512 1000,512" class="wdata4"
              data-info="GPIO25 → R1 220Ω → MOSFET#1 Gate|Slew-rate limiting|ON/OFF only — NEVER apply PWM"/>

    <!-- R1 220Ω (pump gate series) -->

<script>
  const tip=document.getElementById('tip'),tipTtl=document.getElementById('tipTtl'),tipDesc=document.getElementById('tipDesc');
  document.querySelectorAll('[data-info]').forEach(el=>{
    el.addEventListener('mouseenter',e=>{
      const t=e.target.closest('[data-info]')||e.target,info=t.getAttribute('data-info');
      if(info){const p=info.split('|');tipTtl.textContent=p[0];tipDesc.innerHTML=p.slice(1).join('<br>');tip.classList.add('on');}
    });
    el.addEventListener('mouseleave',()=>tip.classList.remove('on'));
  });
  const container=document.getElementById('schematic-container'),wrapper=document.getElementById('svg-wrapper'),zoomLevelEl=document.getElementById('zoom-level');
  let scale=1,panX=0,panY=0,isPanning=false,startX,startY;
  const MIN_SCALE=0.1,MAX_SCALE=4,ZOOM_STEP=0.15,SVG_W=2400,SVG_H=1900;
  function updateTransform(){wrapper.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;zoomLevelEl.textContent=Math.round(scale*100)+'%';}
  function zoomTo(ns,cx,cy){ns=Math.max(MIN_SCALE,Math.min(MAX_SCALE,ns));if(cx!==undefined){const r=ns/scale;panX=cx-(cx-panX)*r;panY=cy-(cy-panY)*r;}scale=ns;updateTransform();}
  function zoomIn(){const r=container.getBoundingClientRect();zoomTo(scale*(1+ZOOM_STEP),r.width/2,r.height/2);}
  function zoomOut(){const r=container.getBoundingClientRect();zoomTo(scale*(1-ZOOM_STEP),r.width/2,r.height/2);}
  function fitToScreen(){const r=container.getBoundingClientRect();scale=Math.min(r.width/SVG_W,r.height/SVG_H)*0.95;panX=(r.width-SVG_W*scale)/2;panY=(r.height-SVG_H*scale)/2;updateTransform();}
  document.getElementById('zoom-in').addEventListener('click',zoomIn);
  document.getElementById('zoom-out').addEventListener('click',zoomOut);
  document.getElementById('zoom-fit').addEventListener('click',fitToScreen);
  container.addEventListener('wheel',e=>{e.preventDefault();const r=container.getBoundingClientRect();zoomTo(scale*(e.deltaY>0?(1-ZOOM_STEP):(1+ZOOM_STEP)),e.clientX-r.left,e.clientY-r.top);},{passive:false});
  container.addEventListener('mousedown',e=>{if(e.target.closest('.comp')||e.target.closest('#zoom-controls'))return;isPanning=true;startX=e.clientX-panX;startY=e.clientY-panY;container.classList.add('grabbing');});
  window.addEventListener('mousemove',e=>{if(!isPanning)return;panX=e.clientX-startX;panY=e.clientY-startY;updateTransform();});
  window.addEventListener('mouseup',()=>{isPanning=false;container.classList.remove('grabbing');});
  let lastTouchDist=0;
  container.addEventListener('touchstart',e=>{if(e.touches.length===1){isPanning=true;startX=e.touches[0].clientX-panX;startY=e.touches[0].clientY-panY;}else if(e.touches.length===2){isPanning=false;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTouchDist=Math.sqrt(dx*dx+dy*dy);}},{passive:false});
  container.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&isPanning){panX=e.touches[0].clientX-startX;panY=e.touches[0].clientY-startY;updateTransform();}else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy),r=container.getBoundingClientRect(),cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;zoomTo(scale*(dist/lastTouchDist),cx,cy);lastTouchDist=dist;}},{passive:false});
  container.addEventListener('touchend',()=>{isPanning=false;});
  window.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey){if(e.key==='+'||e.key==='='){e.preventDefault();zoomIn();}else if(e.key==='-'||e.key==='_'){e.preventDefault();zoomOut();}else if(e.key==='0'||e.key===')'){e.preventDefault();fitToScreen();}}});
  window.addEventListener('load',()=>{setTimeout(fitToScreen,100);});
  function getSvgString(){
    const clone=document.getElementById('schematic-svg').cloneNode(true);
    const styleTag=document.querySelector('style');
    const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
    const style=document.createElementNS("http://www.w3.org/2000/svg","style");
    style.textContent=styleTag?styleTag.innerHTML:'';
    defs.appendChild(style);
    const bgRect=document.createElementNS("http://www.w3.org/2000/svg","rect");
    bgRect.setAttribute("width","100%");bgRect.setAttribute("height","100%");bgRect.setAttribute("fill","#0A0A0F");
    clone.insertBefore(bgRect,clone.firstChild);clone.insertBefore(defs,clone.firstChild);
    if(!clone.getAttribute("xmlns"))clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
    return new XMLSerializer().serializeToString(clone);
  }
  document.getElementById('export-svg').addEventListener('click',()=>{
    const blob=new Blob([getSvgString()],{type:"image/svg+xml;charset=utf-8"});
    const url=URL.createObjectURL(blob),link=document.createElement("a");
    link.href=url;link.download="Smart_Vertical_Tower_Schematic_Rev1.svg";
    document.body.appendChild(link);link.click();document.body.removeChild(link);URL.revokeObjectURL(url);
  });
  document.getElementById('export-png').addEventListener('click',()=>{
    const btn=document.getElementById('export-png'),origText=btn.textContent;
    btn.textContent="WAIT...";btn.style.opacity="0.5";
    const canvas=document.createElement("canvas");canvas.width=SVG_W;canvas.height=SVG_H;
    const ctx=canvas.getContext("2d"),img=new Image();
    const url=URL.createObjectURL(new Blob([getSvgString()],{type:"image/svg+xml;charset=utf-8"}));
    img.onload=function(){ctx.drawImage(img,0,0);URL.revokeObjectURL(url);
      try{const link=document.createElement("a");link.href=canvas.toDataURL("image/png",1.0);link.download="Smart_Vertical_Tower_Schematic_Rev1.png";document.body.appendChild(link);link.click();document.body.removeChild(link);}
      catch(e){console.error("PNG export error:",e.message);}
      finally{btn.textContent=origText;btn.style.opacity="1";}};
    img.src=url;
  });
</script>
</body>
