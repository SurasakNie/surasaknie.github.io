<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Vertical Hydroponic Tower — Schematic Rev 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
  /* === THEME START — Cyberpunk === */
  :root {
    --bg-dark:          #0A0A0F;
    --bg-panel:         rgba(20, 20, 31, 0.95);
    --wire-12v:         #FF6B2B;
    --wire-5v:          #F5E642;
    --wire-3v3:         #1D8FD4;
    --wire-gnd:         #404058;
    --wire-data:        #0FF0B3;
    --wire-data2:       #FF2D78;
    --wire-data3:       #BF5FFF;
    --wire-data4:       #FFC0A3;
    --wire-data5:       #A3FCED;
    --wire-data6:       #4DBBFF;
    --wire-data7:       #97E86B;
    --text-primary:     #E0E0F0;
    --text-secondary:   #8888A0;
    --accent:           #0FF0B3;
    --border:           rgba(44, 44, 64, 0.8);
    --comp-fill:        #14141F;
    --comp-fill-hover:  #22222E;
    --comp-stroke:      #2C2C40;
    --pin-dot:          #0FF0B3;
    --warn:             #FF2D78;
    --warn-bg:          #2E0214;
    --table-header-tint:     rgba(15,240,179,0.08);
    --table-header-tint-dim: rgba(15,240,179,0.04);
  }
  /* === THEME END === */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg-dark); color:var(--text-primary); font-family:'Roboto',sans-serif; min-height:100vh; overflow:hidden; }
  .schematic-container { width:100%; height:100vh; overflow:hidden; position:relative; cursor:grab; }
  .schematic-container.grabbing { cursor:grabbing; }
  .svg-wrapper { transform-origin:0 0; will-change:transform; position:absolute; top:0; left:0; }
  .comp { fill:var(--comp-fill); stroke:var(--comp-stroke); stroke-width:1.5; cursor:pointer; transition:all .2s ease; }
  .comp:hover { fill:var(--comp-fill-hover); stroke:var(--accent); stroke-width:2; }
  .sec-border-dash { fill:none; stroke:var(--comp-stroke); stroke-width:1.5; stroke-dasharray:6 6; opacity:0.8; }
  .w12v     { stroke:var(--wire-12v); stroke-width:2.5; fill:none; }
  .w12v-bus { stroke:var(--wire-12v); stroke-width:4;   fill:none; }
  .wgnd     { stroke:var(--wire-gnd); stroke-width:2.5; fill:none; }
  .wgnd-bus { stroke:var(--wire-gnd); stroke-width:4;   fill:none; }
  .w5v      { stroke:var(--wire-5v);  stroke-width:2;   fill:none; }
  .w3v3     { stroke:var(--wire-3v3); stroke-width:2;   fill:none; }
  .wdata    { stroke:var(--wire-data);  stroke-width:2; fill:none; }
  .wdata2   { stroke:var(--wire-data2); stroke-width:2; fill:none; }
  .wdata3   { stroke:var(--wire-data3); stroke-width:2; fill:none; }
  .wdata4   { stroke:var(--wire-data4); stroke-width:2; fill:none; }
  .wdata5   { stroke:var(--wire-data5); stroke-width:2; fill:none; }
  .wdata6   { stroke:var(--wire-data6); stroke-width:2; fill:none; }
  .wdata7   { stroke:var(--wire-data7); stroke-width:2; fill:none; }
  .wbkp-gnd { stroke:var(--wire-gnd);   stroke-width:2; fill:none; }
  .j12v  { fill:var(--wire-12v); }
  .j5v   { fill:var(--wire-5v);  }
  .j3v3  { fill:var(--wire-3v3); }
  .jdata { fill:var(--wire-data); }
  .jdata2{ fill:var(--wire-data2); }
  .jdata3{ fill:var(--wire-data3); }
  .jdata4{ fill:var(--wire-data4); }
  .jdata5{ fill:var(--wire-data5); }
  .jdata6{ fill:var(--wire-data6); }
  .jdata7{ fill:var(--wire-data7); }
  .jgnd  { fill:var(--wire-gnd);   }
  .pin   { fill:var(--pin-dot); }
  .pin-sep { stroke:var(--comp-stroke); stroke-width:0.5; opacity:0.8; }
  .pin-row { font-family:'Roboto',sans-serif; font-weight:500; }
  polyline[data-info], line[data-info], path[data-info] { cursor:pointer; pointer-events:visibleStroke; }
  polyline[data-info]:hover, line[data-info]:hover, path[data-info]:hover { stroke-width:6; filter:brightness(1.4); }
  text { font-family:'Roboto',sans-serif; font-weight:500; }
  .bold-text  { font-weight:700; }
  .black-text { font-weight:900; }
  .tip { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--bg-dark); border:1px solid var(--accent); border-radius:4px; padding:16px 24px; font-size:15px; color:var(--text-primary); opacity:0; pointer-events:none; z-index:100; max-width:620px; text-align:center; transition:opacity .2s,transform .2s; }
  .tip.on { opacity:1; transform:translateX(-50%) translateY(-8px); }
  .tip .ttl { color:var(--accent); font-weight:900; margin-bottom:6px; font-size:16px; letter-spacing:1px; text-transform:uppercase; }
  .tip .desc { line-height:1.5; color:var(--text-secondary); font-weight:500; }
  #zoom-controls { position:fixed; bottom:30px; left:30px; display:flex; gap:6px; z-index:100; align-items:center; }
  .zoom-btn { background:var(--bg-panel); border:1px solid var(--border); color:var(--text-primary); width:40px; height:40px; border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; transition:all 0.2s; font-family:'Roboto',sans-serif; }
  .zoom-btn:hover { border-color:var(--accent); color:var(--accent); }
  .zoom-btn:active { transform:scale(0.95); }
  .zoom-btn.fit-btn { width:auto; padding:0 14px; font-size:13px; letter-spacing:1px; font-weight:700; }
  #zoom-level { color:var(--text-primary); font-size:13px; font-weight:700; min-width:52px; text-align:center; padding:0 6px; user-select:none; }
  .zoom-shortcut-hint { position:fixed; bottom:75px; left:30px; font-size:11px; font-weight:500; color:var(--text-secondary); z-index:100; letter-spacing:0.5px; }
</style>
</head>
<body>
<div class="schematic-container" id="schematic-container">
<div class="svg-wrapper" id="svg-wrapper">
<svg width="2400" height="2800" viewBox="-180 -15 2420 2815"
     xmlns="http://www.w3.org/2000/svg" id="schematic-svg">

  <!-- REGISTRATION MARKS -->
  <g stroke="var(--text-secondary)" stroke-width="2" opacity="0.6">
    <path d="M -150 20 h 20 M -140 10 v 20"/>
    <path d="M 2210 20 h 20 M 2220 10 v 20"/>
    <path d="M -150 2780 h 20 M -140 2770 v 20"/>
    <path d="M 2210 2780 h 20 M 2220 2770 v 20"/>
  </g>

  <g transform="translate(80,0)">

    <!-- =================================================
         TITLE BLOCK
         ================================================= -->
    <g id="title-block">
      <text x="40" y="18" font-size="22" fill="var(--text-primary)" class="black-text" letter-spacing="4">S M A R T  V E R T I C A L  H Y D R O P O N I C S  T O W E R</text>
      <text x="40" y="40" font-size="14" fill="var(--accent)" class="bold-text" letter-spacing="1">Smart Vertical Tower · Schematic Rev 3 · 2026-05-12</text>
      <text x="40" y="58" font-size="13" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">ESP32 · 12V DC · Water Pump · LED Strips · DHT22 · TSL2591 · XKC-Y25-V · TC4427 Gate Driver</text>
      <!-- Legend -->
      <rect x="1260" y="10" width="960" height="52" rx="4" fill="var(--bg-panel)" stroke="var(--border)" stroke-width="1.5"/>
      <rect x="1280" y="33" width="24" height="3" rx="1.5" fill="var(--wire-12v)"/>
      <text x="1312" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">12V</text>
      <rect x="1360" y="33" width="24" height="3" rx="1.5" fill="var(--wire-5v)"/>
      <text x="1392" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">5V</text>
      <rect x="1430" y="33" width="24" height="3" rx="1.5" fill="var(--wire-gnd)"/>
      <text x="1462" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GND</text>
      <rect x="1510" y="33" width="24" height="3" rx="1.5" fill="var(--wire-3v3)"/>
      <text x="1542" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">3.3V</text>
      <rect x="1600" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data)"/>
      <text x="1632" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GPIO4</text>
      <rect x="1700" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data2)"/>
      <text x="1732" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">I2C</text>
      <rect x="1780" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data3)"/>
      <text x="1812" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">SENSOR</text>
      <rect x="1890" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data4)"/>
      <text x="1922" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GPIO25</text>
      <rect x="2000" y="33" width="24" height="3" rx="1.5" fill="var(--wire-data5)"/>
      <text x="2032" y="39" font-size="12" fill="var(--text-secondary)" class="bold-text" letter-spacing="1">GPIO26</text>
    </g>

    <!-- =================================================
         ZONE A — POWER CHAIN  (y 100–310)
         ================================================= -->

    <!-- 12V Bus -->
    <line x1="50" y1="110" x2="1900" y2="110" class="w12v-bus"
          data-info="12V Power Bus|Main distribution rail|Feeds: XL4015 Buck, TC4427 VDD, MOSFET drains|Fused at 15A T-slow · PSU 20A (Rev 3 — Option B worst-case 13.70A nom · ~16A inrush)"/>
    <text x="1895" y="102" font-size="13" fill="var(--wire-12v)" text-anchor="end" class="black-text" letter-spacing="2">── 12V BUS ──</text>

    <!-- PSU block — Rev 3: upgraded to 20A (Option B worst case) -->
    <rect class="comp" rx="2" x="50" y="180" width="160" height="100"
          data-info="12V PSU · 20A|Switching supply · Rev 3 upgraded from 15A|Combined load 13.70A nominal (Option B max LEDs + pump + control) · 20A gives 31.5% headroom|Inrush peak ~16A within 20A rating|e.g. Meanwell LRS-240-12 (240W)"/>
    <text x="130" y="223" font-size="16" fill="var(--accent)" text-anchor="middle" class="black-text">12V PSU</text>
    <text x="130" y="243" font-size="13" fill="var(--text-primary)" text-anchor="middle" class="bold-text">20A DC</text>

    <!-- PSU (+) → Fuse -->
    <line x1="210" y1="230" x2="250" y2="230" class="w12v"/>

    <!-- PSU GND → common ground bus -->
    <line x1="130" y1="280" x2="130" y2="1020" class="wgnd" data-info="PSU GND|To common ground bus"/>

    <!-- 15A T-slow Fuse (Rev 3) -->
    <rect class="comp" rx="2" x="250" y="208" width="90" height="44"
          data-info="15A T-slow Fuse|Inline on positive 12V rail|Slow-blow tolerates pump inrush (~4A, &lt;200ms) + LED soft-start|Replaces Rev 2 10A blade (would trip at 13.70A continuous)"/>
    <text x="295" y="224" font-size="12" fill="var(--accent)" text-anchor="middle" class="black-text">15A T Fuse</text>
    <text x="295" y="239" font-size="9"  fill="var(--text-secondary)" text-anchor="middle" class="bold-text">slow-blow</text>

    <!-- Fuse right → vertical rise to 12V bus (arc hop over 5V rail at y=140) -->
    <line x1="340" y1="230" x2="390" y2="230" class="w12v"/>
    <path d="M 390,230 L 390,145 A 5,5 0 0,1 390,135 L 390,110" class="w12v"/>
    <circle cx="390" cy="110" r="4.5" class="j12v"/>

    <!-- XL4015 Buck Converter block — Rev 2: output set to 5.15–5.20V -->
    <rect class="comp" rx="2" x="430" y="175" width="150" height="110"
          data-info="XL4015 Buck Converter|12V → 5V step-down|Rev 2: Set output to 5.15–5.20V|XKC-Y25-V min VCC=5.0V; sag margin prevents brownout|Feeds ESP32 VIN + XKC-Y25-V sensor"/>
    <text x="505" y="216" font-size="15" fill="var(--accent)" text-anchor="middle" class="black-text">XL4015</text>
    <text x="505" y="236" font-size="13" fill="var(--text-primary)" text-anchor="middle" class="bold-text">BUCK 5V</text>
    <text x="505" y="254" font-size="11" fill="var(--text-secondary)" text-anchor="middle" class="bold-text">12V → 5V</text>
    <!-- Top pins: 12V IN (left) and 5V OUT (right) -->
    <circle cx="450" cy="175" r="3" class="pin"/>
    <circle cx="560" cy="175" r="3" class="pin"/>
    <!-- Bottom pin: GND -->
    <circle cx="505" cy="285" r="3" class="pin"/>
    <text x="512" y="297" font-size="9" fill="var(--wire-gnd)" text-anchor="start" class="bold-text">GND</text>

    <!-- 12V IN: from 12V bus down to XL4015 top-left pin (arc hop over 5V rail at y=140) -->
    <path d="M 450,110 L 450,135 A 5,5 0 0,1 450,145 L 450,175" class="w12v"
          data-info="12V → XL4015 VIN|Tap from 12V bus|Powers the buck converter"/>
    <circle cx="450" cy="110" r="4.5" class="j12v"/>
    <text x="444" y="172" font-size="9" fill="var(--wire-12v)" text-anchor="end" class="bold-text">12V IN</text>

    <!-- 5V OUT: from XL4015 top-right pin up to 5V rail (short stub) -->
    <line x1="560" y1="140" x2="560" y2="175" class="w5v"
          data-info="XL4015 → 5V RAIL|Regulated 5V output · Rev 2: 5.15–5.20V|To ESP32 VIN and XKC-Y25-V sensor"/>
    <circle cx="560" cy="140" r="3.5" class="j5v"/>
    <text x="566" y="172" font-size="9" fill="var(--wire-5v)" text-anchor="start" class="bold-text">5V OUT</text>

    <!-- XL4015 GND → common ground bus (routes down then left to avoid voltage divider box) -->
    <polyline points="505,285 505,710 395,710 395,1020" class="wgnd" data-info="XL4015 GND|Routed around voltage divider · To common ground bus"/>

    <!-- 5V rail (horizontal) — left end aligned with 12V bus at x=50 -->
    <line x1="560" y1="140" x2="1900" y2="140" class="w5v"
          data-info="5V Rail|XL4015 regulated output · Rev 2: 5.15–5.20V|Feeds: ESP32 VIN, XKC-Y25-V sensor"/>
    <text x="1895" y="132" font-size="12" fill="var(--wire-5v)" text-anchor="end" class="black-text" letter-spacing="2">── 5V RAIL ──</text>

    <!-- 5V rail left extension — from x=50 (aligned with 12V bus) to XL4015 5V OUT -->
    <line x1="50" y1="140" x2="560" y2="140" class="w5v"
          data-info="5V Rail|Extension to XKC-Y25-V sensor feed"/>
    <!-- XKC drop at x=355 — right of all sensor right edges (x=350) by 5 units -->
    <circle cx="355" cy="140" r="3.5" class="j5v"/>
    <line x1="355" y1="140" x2="355" y2="684" class="w5v"
          data-info="5V → XKC-Y25-V VCC|XL4015 5V rail · Routed right of sensor column"/>
    <line x1="240" y1="684" x2="355" y2="684" class="w5v"
          data-info="5V → XKC-Y25-V VCC|Connects to sensor VCC stub"/>

    <!-- =================================================
         ZONE B — ESP32 MCU  (y 370–660)
         ================================================= -->

    <!-- ESP32 body -->
    <rect class="comp" rx="2" x="570" y="370" width="200" height="300"
          data-info="ESP32 Microcontroller|VIN=5V · Internal 3.3V LDO|GPIO4: DHT22 · GPIO21/22: I2C|GPIO25: Pump → TC4427 IN-B · GPIO26: LED → TC4427 IN-A|GPIO34: Water level sensor in"/>
    <text x="670" y="415" font-size="20" fill="var(--accent)" text-anchor="middle" class="black-text">ESP32</text>
    <text x="670" y="438" font-size="14" fill="var(--text-primary)" text-anchor="middle" class="bold-text">30-pin Module</text>
    <text x="670" y="478" font-size="11" fill="var(--wire-3v3)" text-anchor="middle" class="bold-text">3.3V INT RAIL</text>

    <!-- ESP32 left pins (labels inside body) -->
    <circle cx="570" cy="390" r="3" class="pin"/>
    <text x="578" y="394" font-size="11" fill="var(--wire-3v3)" text-anchor="start" class="bold-text">3.3V</text>
    <circle cx="570" cy="470" r="3" class="pin"/>
    <text x="578" y="474" font-size="12" fill="var(--wire-data)" text-anchor="start" class="bold-text">GPIO4</text>
    <circle cx="570" cy="500" r="3" class="pin"/>
    <text x="578" y="504" font-size="12" fill="var(--wire-5v)" text-anchor="start" class="bold-text">VIN</text>
    <circle cx="570" cy="526" r="3" class="pin"/>
    <text x="578" y="530" font-size="12" fill="var(--wire-gnd)" text-anchor="start" class="bold-text">GND</text>
    <circle cx="570" cy="572" r="3" class="pin"/>
    <text x="578" y="576" font-size="11" fill="var(--wire-data3)" text-anchor="start" class="bold-text">GPIO34</text>
    <text x="578" y="589" font-size="9" fill="var(--text-secondary)" text-anchor="start">(input only)</text>
    <circle cx="570" cy="602" r="3" class="pin"/>
    <text x="578" y="606" font-size="12" fill="var(--wire-data2)" text-anchor="start" class="bold-text">GPIO21</text>
    <circle cx="570" cy="620" r="3" class="pin"/>
    <text x="578" y="624" font-size="12" fill="var(--wire-data2)" text-anchor="start" class="bold-text">GPIO22</text>

    <!-- 3.3V rail from ESP32 → DHT22 + TSL2591 -->
    <line x1="240" y1="390" x2="570" y2="390" class="w3v3"
          data-info="3.3V Rail|ESP32 internal LDO output|Feeds: DHT22 · TSL2591"/>
    <circle cx="240" cy="390" r="3.5" class="j3v3"/>
    <circle cx="390" cy="390" r="3.5" class="j3v3"/>
    <!-- DHT22 3.3V drop: (240,390)→(240,424) stays above body top y=440 -->
    <line x1="240" y1="390" x2="240" y2="424" class="w3v3"
          data-info="3.3V → DHT22 VCC"/>
    <!-- TSL2591 3.3V: drop at x=390 (right of sensor bodies) then left to stub -->
    <line x1="390" y1="390" x2="390" y2="549" class="w3v3"
          data-info="3.3V → TSL2591 VCC|Right-side drop at x=390 avoids DHT22 body"/>
    <line x1="240" y1="549" x2="390" y2="549" class="w3v3"
          data-info="3.3V → TSL2591 VCC"/>

    <!-- ESP32 right pins (TC4427 connections, labels inside body) -->
    <circle cx="770" cy="590" r="3" class="pin"/>
    <text x="760" y="594" font-size="12" fill="var(--wire-data4)" text-anchor="end" class="bold-text">GPIO25</text>
    <circle cx="770" cy="620" r="3" class="pin"/>
    <text x="760" y="624" font-size="12" fill="var(--wire-data5)" text-anchor="end" class="bold-text">GPIO26</text>

    <!-- 5V rail → ESP32 VIN -->
    <line x1="562" y1="140" x2="562" y2="500" class="w5v"
          data-info="5V → ESP32 VIN|Buck converter regulated 5V · Rev 2: 5.15–5.20V|ESP32 internal LDO generates 3.3V"/>
    <circle cx="562" cy="140" r="3.5" class="j5v"/>
    <line x1="562" y1="500" x2="570" y2="500" class="w5v"/>

    <!-- ESP32 GND → sensor GND bus at x=175 (arc hop at x=390 over 3.3V drop) -->
    <polyline points="570,526 556,526 556,540 395,540" class="wgnd" data-info="ESP32 GND|Joins sensor GND bus at x=175"/>
    <path d="M 395,540 A 5,5 0 0,1 385,540 L 175,540" class="wgnd"/>
    <circle cx="505" cy="540" r="4.5" class="jgnd"/>
    <circle cx="175" cy="540" r="4.5" class="jgnd"/>

    <!-- =================================================
         ZONE C — SENSORS  (y 430–800)
         ================================================= -->

    <!-- DHT22 block -->
    <rect class="comp" rx="2" x="200" y="440" width="150" height="75"
          data-info="DHT22 · Temp/Humidity|VCC=3.3V · GPIO4 data|Single-wire protocol|No external pullup needed (module)"/>
    <text x="275" y="468" font-size="14" fill="var(--accent)" text-anchor="middle" class="black-text">DHT22</text>
    <text x="275" y="486" font-size="12" fill="var(--text-primary)" text-anchor="middle" class="bold-text">Temp / Humidity</text>

    <!-- DHT22 VCC — 3.3V power stub -->
    <line x1="240" y1="440" x2="240" y2="424" class="w3v3"/>
    <text x="240" y="416" font-size="11" fill="var(--wire-3v3)" text-anchor="middle" class="bold-text">3.3V</text>
    <circle cx="240" cy="440" r="3" class="pin"/>
    <text x="250" y="437" font-size="10" fill="var(--wire-3v3)" class="bold-text">① VCC</text>

    <!-- DHT22 GND → sensor GND bus at x=175 (stub 8px below box bottom y=515) -->
    <polyline points="240,515 240,523 175,523" class="wgnd" data-info="DHT22 GND|To sensor GND bus"/>
    <circle cx="240" cy="515" r="3" class="pin"/>
    <text x="248" y="513" font-size="10" fill="var(--wire-gnd)" class="bold-text">④ GND</text>

    <!-- GPIO4 → DHT22 DATA (left-side pin, hops at x=562 5V VIN and x=390 3.3V→TSL2591) -->
    <path d="M 570,470 L 567,470 A 5,5 0 0,1 557,470 L 395,470 A 5,5 0 0,1 385,470 L 350,470"
          class="wdata" data-info="GPIO4 · DHT22 Data|Single-wire DHT protocol|ESP32 GPIO4 → DHT22 DATA pin"/>
    <text x="480" y="463" font-size="10" fill="var(--wire-data)" text-anchor="middle" class="bold-text">GPIO4</text>
    <circle cx="350" cy="470" r="3" class="pin"/>
    <text x="344" y="467" font-size="10" fill="var(--wire-data)" text-anchor="end" class="bold-text">② DATA</text>

    <text x="1370" y="1115" font-size="12" fill="var(--text-secondary)" class="bold-text">

    <text x="1370" y="1153" font-size="12" fill="var(--warn)" class="bold-text">

      <tspan x="1390" dy="16">Without it: 60V spike on VDD → IC destroyed on first switch.</tspan>

    <text x="1370" y="1191" font-size="12" fill="var(--warn)" class="bold-text">

    </text>

    <text x="1370" y="1229" font-size="12" fill="var(--text-secondary)" class="bold-text">
      <tspan fill="var(--text-primary)">4.</tspan> Z1/Z2 (15V zener): clamps Vgs from pump back-EMF spikes.
      <tspan x="1390" dy="16">Keep R1/R2 22Ω in series to limit zener peak current.</tspan>
    </text>

    <text x="1370" y="1267" font-size="12" fill="var(--text-secondary)" class="bold-text">
      <tspan fill="var(--text-primary)">5.</tspan> XL4015 output: set to 5.15–5.20V (XKC min VCC = 5.0V sag margin).
    </text>

    <text x="1370" y="1291" font-size="12" fill="var(--text-secondary)" class="bold-text">
      <tspan fill="var(--text-primary)">6.</tspan> TSL2591 I2C pull-ups: on-module (breakout) — OK.
      <tspan x="1390" dy="16">Bare chip only: add 4.7kΩ resistors from SDA/SCL to 3.3V.</tspan>
    </text>

    <text x="1370" y="1345" font-size="12" fill="var(--text-secondary)" class="bold-text">

    <text x="330" y="1954" font-size="10" fill="var(--text-secondary)" class="bold-text">Match 12V trunk; star-gnd at PSU −V</text>

    <text x="70"  y="1974" font-size="10" fill="var(--text-primary)" class="bold-text">GND return (LED + 4× branches)</text>
    <text x="293" y="1974" font-size="10" fill="var(--accent)" class="black-text" text-anchor="middle">14</text>
    <text x="330" y="1974" font-size="10" fill="var(--text-secondary)" class="bold-text">AWG18/branch (3.0A Opt B max) — see †</text>
    <line x1="60" y1="1980" x2="640.68" y2="1980" stroke="var(--border)" stroke-width="0.5" opacity="0.4"/>

    <text x="70"  y="1994" font-size="10" fill="var(--text-primary)" class="bold-text">GND return (pump)</text>
    <text x="293" y="1994" font-size="10" fill="var(--accent)" class="black-text" text-anchor="middle">18</text>
    <text x="330" y="1994" font-size="10" fill="var(--text-secondary)" class="bold-text">Match pump supply gauge</text>
    <line x1="60" y1="2000" x2="640.68" y2="2000" stroke="var(--border)" stroke-width="0.5" opacity="0.4"/>

    <text x="70"  y="2014" font-size="10" fill="var(--text-primary)" class="bold-text">GND return (5V/sensors)</text>
    <text x="293" y="2014" font-size="10" fill="var(--accent)" class="black-text" text-anchor="middle">22</text>
    <text x="330" y="2014" font-size="10" fill="var(--text-secondary)" class="bold-text">Match 5V rail supply gauge</text>

  </g>

</div>
</div>

<!-- Zoom Controls -->
<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in" title="Zoom In (Ctrl+Shift++)">+</button>
  <button class="zoom-btn" id="zoom-out" title="Zoom Out (Ctrl+Shift+−)">−</button>
  <span id="zoom-level">100%</span>
  <button class="zoom-btn fit-btn" id="zoom-fit" title="Fit to Screen (Ctrl+Shift+0)">FIT</button>
  <button class="zoom-btn fit-btn" id="export-svg" title="Export as Standalone SVG"
          style="margin-left:12px;color:var(--wire-data);">Export SVG</button>
  <button class="zoom-btn fit-btn" id="export-png" title="Export as High-Res PNG"
          style="color:var(--wire-5v);">Export PNG</button>
</div>
<div class="zoom-shortcut-hint">Ctrl+Shift+ +/−/0 · Scroll to zoom · Drag to pan</div>

<div class="tip" id="tip">
  <div class="ttl" id="tipTtl">Component Name</div>
  <div class="desc" id="tipDesc">Description</div>
</div>

<script>
  const tip=document.getElementById('tip'),tipTtl=document.getElementById('tipTtl'),tipDesc=document.getElementById('tipDesc');
  document.querySelectorAll('[data-info]').forEach(el=>{
    el.addEventListener('mouseenter',e=>{
      const t=e.target.closest('[data-info]')||e.target,info=t.getAttribute('data-info');
      if(info){const p=info.split('|');tipTtl.textContent=p[0];tipDesc.innerHTML=p.slice(1).join('<br>');tip.classList.add('on');}
    });
    el.addEventListener('mouseleave',()=>tip.classList.remove('on'));
  });
  const container=document.getElementById('schematic-container'),wrapper=document.getElementById('svg-wrapper'),zoomLevelEl=document.getElementById('zoom-level');
  let scale=1,panX=0,panY=0,isPanning=false,startX,startY;
  const MIN_SCALE=0.1,MAX_SCALE=4,ZOOM_STEP=0.15,SVG_W=2400,SVG_H=2400;
  function updateTransform(){wrapper.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;zoomLevelEl.textContent=Math.round(scale*100)+'%';}
  function zoomTo(ns,cx,cy){ns=Math.max(MIN_SCALE,Math.min(MAX_SCALE,ns));if(cx!==undefined){const r=ns/scale;panX=cx-(cx-panX)*r;panY=cy-(cy-panY)*r;}scale=ns;updateTransform();}
  function zoomIn(){const r=container.getBoundingClientRect();zoomTo(scale*(1+ZOOM_STEP),r.width/2,r.height/2);}
  function zoomOut(){const r=container.getBoundingClientRect();zoomTo(scale*(1-ZOOM_STEP),r.width/2,r.height/2);}
  function fitToScreen(){const r=container.getBoundingClientRect();scale=Math.min(r.width/SVG_W,r.height/SVG_H)*0.95;panX=(r.width-SVG_W*scale)/2;panY=(r.height-SVG_H*scale)/2;updateTransform();}
  document.getElementById('zoom-in').addEventListener('click',zoomIn);
  document.getElementById('zoom-out').addEventListener('click',zoomOut);
  document.getElementById('zoom-fit').addEventListener('click',fitToScreen);
  container.addEventListener('wheel',e=>{e.preventDefault();const r=container.getBoundingClientRect();zoomTo(scale*(e.deltaY>0?(1-ZOOM_STEP):(1+ZOOM_STEP)),e.clientX-r.left,e.clientY-r.top);},{passive:false});
  container.addEventListener('mousedown',e=>{if(e.target.closest('.comp')||e.target.closest('#zoom-controls'))return;isPanning=true;startX=e.clientX-panX;startY=e.clientY-panY;container.classList.add('grabbing');});
  window.addEventListener('mousemove',e=>{if(!isPanning)return;panX=e.clientX-startX;panY=e.clientY-startY;updateTransform();});
  window.addEventListener('mouseup',()=>{isPanning=false;container.classList.remove('grabbing');});
  let lastTouchDist=0;
  container.addEventListener('touchstart',e=>{if(e.touches.length===1){isPanning=true;startX=e.touches[0].clientX-panX;startY=e.touches[0].clientY-panY;}else if(e.touches.length===2){isPanning=false;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTouchDist=Math.sqrt(dx*dx+dy*dy);}},{passive:false});
  container.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&isPanning){panX=e.touches[0].clientX-startX;panY=e.touches[0].clientY-startY;updateTransform();}else if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy),r=container.getBoundingClientRect(),cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;zoomTo(scale*(dist/lastTouchDist),cx,cy);lastTouchDist=dist;}},{passive:false});
  container.addEventListener('touchend',()=>{isPanning=false;});
  window.addEventListener('keydown',e=>{if(e.ctrlKey&&e.shiftKey){if(e.key==='+'||e.key==='='){e.preventDefault();zoomIn();}else if(e.key==='-'||e.key==='_'){e.preventDefault();zoomOut();}else if(e.key==='0'||e.key===')'){e.preventDefault();fitToScreen();}}});
  window.addEventListener('load',()=>{setTimeout(fitToScreen,100);});
  function getSvgString(){
    const clone=document.getElementById('schematic-svg').cloneNode(true);
    const styleTag=document.querySelector('style');
    const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
    const style=document.createElementNS("http://www.w3.org/2000/svg","style");
    style.textContent=styleTag?styleTag.innerHTML:'';
    defs.appendChild(style);
    const bgRect=document.createElementNS("http://www.w3.org/2000/svg","rect");
    bgRect.setAttribute("width","100%");bgRect.setAttribute("height","100%");bgRect.setAttribute("fill","var(--bg-dark)");
    clone.insertBefore(bgRect,clone.firstChild);clone.insertBefore(defs,clone.firstChild);
    if(!clone.getAttribute("xmlns"))clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
    return new XMLSerializer().serializeToString(clone);
  }
  document.getElementById('export-svg').addEventListener('click',()=>{
    const blob=new Blob([getSvgString()],{type:"image/svg+xml;charset=utf-8"});
    const url=URL.createObjectURL(blob),link=document.createElement("a");
    link.href=url;link.download="Smart_Vertical_Tower_Schematic_Rev2.svg";
    document.body.appendChild(link);link.click();document.body.removeChild(link);URL.revokeObjectURL(url);
  });
  document.getElementById('export-png').addEventListener('click',()=>{
    const btn=document.getElementById('export-png'),origText=btn.textContent;
    btn.textContent="WAIT...";btn.style.opacity="0.5";
    const canvas=document.createElement("canvas");canvas.width=SVG_W;canvas.height=SVG_H;
    const ctx=canvas.getContext("2d"),img=new Image();
    const url=URL.createObjectURL(new Blob([getSvgString()],{type:"image/svg+xml;charset=utf-8"}));
    img.onload=function(){ctx.drawImage(img,0,0);URL.revokeObjectURL(url);
      try{const link=document.createElement("a");link.href=canvas.toDataURL("image/png",1.0);link.download="Smart_Vertical_Tower_Schematic_Rev2.png";document.body.appendChild(link);link.click();document.body.removeChild(link);}
      catch(e){console.error("PNG export error:",e.message);}
      finally{btn.textContent=origText;btn.style.opacity="1";}};
    img.src=url;
  });
</script>
</body>
</html>
