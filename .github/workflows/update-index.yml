name: Update naodec/index.html

on:
  push:
    branches: [NaoDec]

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate naodec/index.html
        id: gen
        run: |
          set -euo pipefail
          cd naodec
          tmp=$(mktemp)
          {
            cat <<'HEAD'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>NaoDec — Documents</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 720px;
                     margin: 3rem auto; padding: 0 1rem; line-height: 1.6; color: #222; }
              h1 { border-bottom: 1px solid #ddd; padding-bottom: .4rem; }
              ul { padding-left: 1.2rem; }
              li { margin: .3rem 0; }
              a { color: #0645ad; text-decoration: none; }
              a:hover { text-decoration: underline; }
              footer { margin-top: 3rem; color: #888; font-size: .85rem; }
            </style>
          </head>
          <body>
            <h1>NaoDec — Documents</h1>
            <p>Rendered HTML documents in this repository. Click to open.</p>
            <ul>
          HEAD
            for f in $(ls *.html 2>/dev/null | grep -v '^index\.html$' | sort); do
              printf '    <li><a href="%s">%s</a></li>\n' "$f" "$f"
            done
            cat <<'TAIL'
            </ul>
            <footer>Auto-generated — see <code>.github/workflows/update-index.yml</code>.</footer>
          </body>
          </html>
          TAIL
          } > "$tmp"

          if ! cmp -s "$tmp" index.html; then
            mv "$tmp" index.html
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.gen.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add naodec/index.html
          git commit -m "chore: regenerate naodec/index.html"
          git push
