  <style>
    :root {
      color-scheme: light dark;
      --bg:        #ffffff;
      --fg:        #222222;

      --link:      #0645ad;
      --link-hover:#0b63d6;
      --code-bg:   rgba(128,128,128,0.15);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #0b1113;
        --fg:        #e6edef;
        --muted:     #8eb5b8;
        --rule:      rgba(142, 181, 184, 0.25);

           margin: 3rem auto; padding: 0 1rem; line-height: 1.6;
           background: var(--bg); color: var(--fg); }
    h1, h2 { border-bottom: 1px solid var(--rule); padding-bottom: .4rem; }
    h2 { margin-top: 2.5rem; font-size: 1.15rem; }
    ul { padding-left: 1.2rem; }
    li { margin: .3rem 0; }
    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }
    footer { margin-top: 3rem; color: var(--muted); font-size: .85rem; }
    code { background: var(--code-bg); padding: 1px 4px; border-radius: 3px; }
  </style>
